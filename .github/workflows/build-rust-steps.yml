name: Build Rust SDK

on:
  workflow_call:
    inputs:
      platform:
        required: false
        type: string
        default: 'ubuntu' # or 'windows' or 'macos'
      useWinML:
        required: false
        type: boolean
        default: false
      run-integration-tests:
        required: false
        type: boolean
        default: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ${{ inputs.platform }}-latest

    defaults:
      run:
        working-directory: sdk/rust

    env:
      CARGO_FEATURES: ${{ inputs.useWinML && '--features winml,nightly' || '--features nightly' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: true

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: sdk/rust -> target

      # The .cargo/config.toml redirects crates-io to an Azure Artifacts feed
      # for CFS compliance. Remove the redirect in CI so cargo can fetch from
      # crates.io directly without Azure DevOps auth.
      - name: Use crates.io directly
        shell: pwsh
        working-directory: sdk/rust
        run: |
          if (Test-Path .cargo/config.toml) {
            Remove-Item .cargo/config.toml
            Write-Host "Removed .cargo/config.toml crates-io redirect"
          }

      # Copy deps_versions.json into the crate directory so cargo package
      # can include it and build.rs can find it during verify.
      - name: Copy deps_versions.json for crate packaging
        shell: pwsh
        working-directory: ${{ github.workspace }}
        run: Copy-Item sdk/deps_versions.json sdk/rust/deps_versions.json

      - name: Checkout test-data-shared from Azure DevOps
        if: ${{ inputs.run-integration-tests }}
        shell: pwsh
        working-directory: ${{ github.workspace }}/..
        run: |
          $pat = "${{ secrets.AZURE_DEVOPS_PAT }}"
          $encodedPat = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$pat"))
          
          # Configure git to use the PAT
          git config --global http.https://dev.azure.com.extraheader "AUTHORIZATION: Basic $encodedPat"
          
          # Clone with LFS to parent directory
          git lfs install
          git clone --depth 1 --branch user/rchava/model-fix https://dev.azure.com/microsoft/windows.ai.toolkit/_git/test-data-shared test-data-shared
          
          Write-Host "Clone completed successfully to ${{ github.workspace }}/../test-data-shared"

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Run Clippy - Rust's official linter for catching common mistakes, enforcing idioms, and improving code quality
      - name: Run clippy
        run: cargo clippy --all-targets ${{ env.CARGO_FEATURES }} -- -D warnings

      - name: Build
        run: cargo build ${{ env.CARGO_FEATURES }}

      - name: Run unit tests
        run: cargo test --lib ${{ env.CARGO_FEATURES }}

      - name: Run integration tests
        if: ${{ inputs.run-integration-tests }}
        run: cargo test --tests ${{ env.CARGO_FEATURES }} -- --include-ignored --test-threads=1 --nocapture

      # --allow-dirty allows publishing with uncommitted changes, needed because the build process modifies generated files
      - name: Package crate
        run: cargo package ${{ env.CARGO_FEATURES }} --allow-dirty

      - name: Upload SDK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rust-sdk-${{ inputs.platform }}${{ inputs.useWinML == true && '-winml' || '' }}
          path: sdk/rust/target/package/*.crate

      - name: Upload flcore logs
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: rust-sdk-${{ inputs.platform }}${{ inputs.useWinML == true && '-winml' || '' }}-logs
          path: sdk/rust/logs/**
