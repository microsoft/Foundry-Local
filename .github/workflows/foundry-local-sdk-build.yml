name: SDK Build

on:
  pull_request:
    paths:
      - 'sdk/**'
      - '.github/workflows/**'
  push:
    paths:
      - 'sdk/**'
      - '.github/workflows/**'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-cs-windows:
    uses: ./.github/workflows/build-cs-steps.yml
    with:
      version: '0.9.0.${{ github.run_number }}'
      platform: 'windows'
    secrets: inherit
  build-js-windows:
    uses: ./.github/workflows/build-js-steps.yml
    with:
      version: '0.9.0.${{ github.run_number }}'
      platform: 'windows'
    secrets: inherit
  build-rust-windows:
    uses: ./.github/workflows/build-rust-steps.yml
    with:
      platform: 'windows'
      run-integration-tests: true
    secrets: inherit

  build-cs-windows-WinML:
    uses: ./.github/workflows/build-cs-steps.yml
    with:
      version: '0.9.0.${{ github.run_number }}'
      platform: 'windows'
      useWinML: true
    secrets: inherit
  build-js-windows-WinML:
    uses: ./.github/workflows/build-js-steps.yml
    with:
      version: '0.9.0.${{ github.run_number }}'
      platform: 'windows'
      useWinML: true
    secrets: inherit
  build-rust-windows-WinML:
    uses: ./.github/workflows/build-rust-steps.yml
    with:
      platform: 'windows'
      useWinML: true
      run-integration-tests: true
    secrets: inherit

  build-cs-macos:
    uses: ./.github/workflows/build-cs-steps.yml
    with:
      version: '0.9.0.${{ github.run_number }}'
      platform: 'macos'
    secrets: inherit
  build-js-macos:
    uses: ./.github/workflows/build-js-steps.yml
    with:
      version: '0.9.0.${{ github.run_number }}'
      platform: 'macos'
    secrets: inherit
  build-rust-macos:
    uses: ./.github/workflows/build-rust-steps.yml
    with:
      platform: 'macos'
      run-integration-tests: true
    secrets: inherit