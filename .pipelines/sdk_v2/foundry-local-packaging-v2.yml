# Foundry Local Packaging Pipeline (v2)
#
# Builds the C++ native SDK (foundry_local.dll) for all platforms + WinML,
# then builds and tests the Python SDK from sdk/python/ (which uses cffi
# against the C ABI instead of the legacy C# interop layer).
#
# This is a subset of the full packaging pipeline — only C++ and Python.
# C#, JS, and Rust SDKs are not built here.
#
# Produces artifacts:
#   cpp-native-{win-x64,win-arm64,linux-x64,osx-arm64}[-winml]
#   cpp-nuget, cpp-nuget-winml
#   python-sdk-{base,winml}-{win-x64,win-arm64,linux-x64,osx-arm64}

trigger:
  branches:
    include:
      - main
      - releases/*

pr:
- main
- releases/*

name: $(Date:yyyyMMdd).$(Rev:r)

parameters:
- name: version
  displayName: 'Package version'
  type: string
  default: '1.2.0'
- name: prereleaseId
  displayName: 'Pre-release identifier (e.g. rc1, beta). Use "none" for default.'
  type: string
  default: 'none'
- name: isRelease
  displayName: 'Release build (omits dev/timestamp suffix)'
  type: boolean
  default: false
- name: buildConfig
  displayName: 'CMake configuration'
  type: string
  default: 'RelWithDebInfo'
  values:
  - Debug
  - Release
  - RelWithDebInfo
  - MinSizeRel

variables:
  # ORT / GenAI / WinML versions must match cmake defaults in
  # sdk_v2/cpp/cmake/FindOnnxRuntime.cmake and FindOnnxRuntimeGenAI.cmake.
  ortVersion: '1.26.0'
  ortVersionWinml: '1.23.2.3'
  genaiVersion: '0.14.0'
  winmlVersion: '1.8.2192'

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    sdl:
      binskim:
        break: false
        scanOutputDirectoryOnly: true
    stages:

    # ── Compute Version ──
    - template: templates/stages-version.yml
      parameters:
        version: ${{ parameters.version }}
        prereleaseId: ${{ parameters.prereleaseId }}
        isRelease: ${{ parameters.isRelease }}

    # ── C++ Native builds (all platforms + WinML) + NuGet pack ──
    - template: templates/stages-build-native.yml
      parameters:
        buildConfig: ${{ parameters.buildConfig }}
        ortVersion: $(ortVersion)
        ortVersionWinml: $(ortVersionWinml)
        genaiVersion: $(genaiVersion)
        winmlVersion: $(winmlVersion)

    # ── Python SDK (base: win-x64, win-arm64, linux-x64, osx-arm64) ──
    - template: templates/stages-python.yml
      parameters:
        variant: base
        pythonRoot: 'sdk/python'

    # ── Python SDK (WinML: win-x64, win-arm64) ──
    - template: templates/stages-python.yml
      parameters:
        variant: winml
        pythonRoot: 'sdk/python'
