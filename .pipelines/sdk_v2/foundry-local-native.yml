# Foundry Local Native SDK Pipeline (sdk_v2/cpp)
#
# Builds the Foundry Local C++ SDK on Windows x64 / Windows ARM64 / Linux x64 /
# macOS ARM64, plus a Windows-only WinML variant (x64 + ARM64), then packs
# the binaries into two NuGet packages:
#
#   * Microsoft.AI.Foundry.Local.Runtime       (all 4 platforms)
#   * Microsoft.AI.Foundry.Local.Runtime.WinML (Windows x64 + ARM64, --use_winml)
#
# Stages:
#   compute_version          – Compute version strings (semver / NuGet / Python flavors)
#   build_win_x64            – Windows x64 (build + test)
#   build_win_arm64          – Windows ARM64 (cross-compile from x64, no tests)
#   build_linux_x64          – Linux x64 (build + test)
#   build_osx_arm64          – macOS ARM64 (build + test, native)
#   build_win_x64_winml      – Windows x64 (--use_winml, no tests)
#   build_win_arm64_winml    – Windows ARM64 (--use_winml, no tests)
#   pack_nuget               – Pack base NuGet (all 4 platforms)
#   pack_nuget_winml         – Pack WinML NuGet (Windows x64 + ARM64)
#
# Both pack stages run on every build (PR and main).

pr:
- main
- releases/*

name: $(Date:yyyyMMdd).$(Rev:r)

parameters:
- name: version
  displayName: 'Package version (base)'
  type: string
  default: '0.1.0'
- name: prereleaseId
  displayName: 'Pre-release identifier (e.g. rc1, beta). Use "none" for default behavior.'
  type: string
  default: 'none'
- name: isRelease
  displayName: 'Release build (omits dev/timestamp suffix)'
  type: boolean
  default: false
- name: buildConfig
  displayName: 'CMake configuration'
  type: string
  default: 'RelWithDebInfo'
  values:
  - Debug
  - Release
  - RelWithDebInfo
  - MinSizeRel

variables:
  # ORT / GenAI / WinML versions must match cmake defaults in
  # sdk_v2/cpp/cmake/FindOnnxRuntime.cmake and FindOnnxRuntimeGenAI.cmake.
  ortVersion: '1.25.1'
  ortVersionWinml: '1.23.2.3'
  genaiVersion: '0.13.2'
  winmlVersion: '1.8.2192'

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    pool:
      # Default for jobs that don't override (the version stage uses this).
      name: onnxruntime-Win-CPU-2022
      os: windows
    sdl:
      binskim:
        break: false
        scanOutputDirectoryOnly: true
    stages:

    # ── Compute Version ──
    # Single source of truth for version strings consumed by the pack stage.
    - template: templates/stages-version.yml
      parameters:
        version: ${{ parameters.version }}
        prereleaseId: ${{ parameters.prereleaseId }}
        isRelease: ${{ parameters.isRelease }}

    # ── Native builds ──
    - template: templates/stages-build-native.yml
      parameters:
        buildConfig: ${{ parameters.buildConfig }}
        ortVersion: $(ortVersion)
        ortVersionWinml: $(ortVersionWinml)
        genaiVersion: $(genaiVersion)
        winmlVersion: $(winmlVersion)
