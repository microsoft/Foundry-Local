# Foundry Local Native SDK Pipeline (sdk_v2/cpp)
#
# Builds the Foundry Local C++ SDK on Windows x64 / Windows ARM64 / Linux x64 /
# macOS ARM64, then (on `main` only) packs the binaries into a single
# Microsoft.AI.Foundry.Local.Runtime NuGet package.
#
# Stages:
#   compute_version    – Compute version strings (semver / NuGet / Python flavors)
#   build_win_x64      – Windows x64 (build + test)
#   build_win_arm64    – Windows ARM64 (cross-compile from x64, no tests)
#   build_linux_x64    – Linux x64 (build + test)
#   build_osx_arm64    – macOS ARM64 (build + test, native)
#   pack_nuget         – Assemble all native artifacts into a NuGet package (main only)
#
# Pull requests run all four build stages but skip pack_nuget.

pr:
- main
- releases/*

name: $(Date:yyyyMMdd).$(Rev:r)

parameters:
- name: version
  displayName: 'Package version (base)'
  type: string
  default: '0.1.0'
- name: prereleaseId
  displayName: 'Pre-release identifier (e.g. rc1, beta). Use "none" for default behavior.'
  type: string
  default: 'none'
- name: isRelease
  displayName: 'Release build (omits dev/timestamp suffix)'
  type: boolean
  default: false
- name: buildConfig
  displayName: 'CMake configuration'
  type: string
  default: 'RelWithDebInfo'
  values:
  - Debug
  - Release
  - RelWithDebInfo
  - MinSizeRel

variables:
  # ORT / GenAI / WinML versions must match cmake defaults in
  # sdk_v2/cpp/cmake/FindOnnxRuntime.cmake and FindOnnxRuntimeGenAI.cmake.
  ortVersion: '1.24.4'
  genaiVersion: '0.13.1'
  winmlVersion: '1.8.2091'

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    pool:
      # Default for jobs that don't override (the version stage uses this).
      name: onnxruntime-Win-CPU-2022
      os: windows
    sdl:
      binskim:
        break: false
        scanOutputDirectoryOnly: true
    stages:

    # ── Compute Version ──
    # Single source of truth for version strings consumed by the pack stage.
    - stage: compute_version
      displayName: 'Compute Version'
      dependsOn: []
      jobs:
      - job: version
        displayName: 'Compute Version'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Build.ArtifactStagingDirectory)/version-info'
        steps:
        - checkout: none
        - task: PowerShell@2
          displayName: 'Compute and write version files'
          inputs:
            targetType: inline
            script: |
              $base  = "${{ parameters.version }}"
              $preId = "${{ parameters.prereleaseId }}"
              $ts    = Get-Date -Format "yyyyMMddHHmm"
              $commitId = "$(Build.SourceVersion)".Substring(0, 8)

              if ($preId -ne '' -and $preId -ne 'none') {
                $sdkVersion = "$base-$preId"
                $pyVersion  = "$base$preId"
                $flcVersion = "$base-$preId"
              } elseif ("${{ parameters.isRelease }}" -ne "True") {
                $sdkVersion = "$base-dev.$ts"
                $pyVersion  = "$base.dev$ts"
                $flcVersion = "$base-dev-$ts-$commitId"
              } else {
                $sdkVersion = $base
                $pyVersion  = $base
                $flcVersion = $base
              }

              $outDir = "$(Build.ArtifactStagingDirectory)/version-info"
              New-Item -ItemType Directory -Path $outDir -Force | Out-Null
              Set-Content -Path "$outDir/sdkVersion.txt" -Value $sdkVersion -NoNewline
              Set-Content -Path "$outDir/pyVersion.txt"  -Value $pyVersion  -NoNewline
              Set-Content -Path "$outDir/flcVersion.txt" -Value $flcVersion -NoNewline

              Write-Host "SDK version:    $sdkVersion"
              Write-Host "Python version: $pyVersion"
              Write-Host "FLC version:    $flcVersion"

    # ── Native builds ──
    - template: templates/stages-build-native.yml
      parameters:
        buildConfig: ${{ parameters.buildConfig }}
        ortVersion: $(ortVersion)
        genaiVersion: $(genaiVersion)
        winmlVersion: $(winmlVersion)
