# Native build + pack stages for the Foundry Local C++ SDK.
#
# Two stages, each with parallel build jobs and a final pack job:
#
#   cpp_build        – Build win-x64, win-arm64, linux-x64, osx-arm64 in
#                       parallel, then pack into Microsoft.AI.Foundry.Local.Runtime
#   cpp_build_winml   – Build win-x64, win-arm64 (--use_winml) in parallel,
#                       then pack into Microsoft.AI.Foundry.Local.Runtime.WinML

parameters:
- name: buildConfig
  type: string
- name: ortVersion
  type: string
- name: ortVersionWinml
  type: string
- name: genaiVersion
  type: string
- name: winmlVersion
  type: string

stages:

  # ====================================================================
  # Base: build all 4 platforms + pack NuGet
  # ====================================================================
  - stage: cpp_build
    displayName: 'C++ Native: Build + Pack'
    dependsOn:
    - compute_version
    jobs:

    # ── Windows x64 ──
    - job: build_win_x64
      displayName: 'Build Windows x64'
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-win-x64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
        - output: pipelineArtifact
          artifactName: 'cpp-native-include'
          targetPath: '$(Build.ArtifactStagingDirectory)/include'
      steps:
      - template: steps-build-windows.yml
        parameters:
          arch: x64
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          winmlVersion: ${{ parameters.winmlVersion }}
          runTests: true
          stageHeaders: true

    # ── Windows ARM64 (cross-compile, no tests) ──
    - job: build_win_arm64
      displayName: 'Build Windows ARM64'
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-win-arm64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
      steps:
      - template: steps-build-windows.yml
        parameters:
          arch: arm64
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          winmlVersion: ${{ parameters.winmlVersion }}
          runTests: false
          stageHeaders: false

    # ── Linux x64 ──
    - job: build_linux_x64
      displayName: 'Build Linux x64'
      pool:
        name: onnxruntime-Ubuntu2404-AMD-CPU
        os: linux
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-linux-x64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
      steps:
      - template: steps-build-linux.yml
        parameters:
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          runTests: true

    # ── macOS ARM64 ──
    - job: build_osx_arm64
      displayName: 'Build macOS ARM64'
      pool:
        name: AcesShared
        os: macOS
        demands:
        - ImageOverride -equals ACES_VM_SharedPool_Sequoia
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-osx-arm64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
      steps:
      - template: steps-build-macos.yml
        parameters:
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          runTests: true

    # ── Pack base NuGet (all 4 platforms) ──
    - job: pack
      displayName: 'Pack NuGet (base)'
      dependsOn:
      - build_win_x64
      - build_win_arm64
      - build_linux_x64
      - build_osx_arm64
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        - input: pipelineArtifact
          artifactName: 'cpp-native-win-x64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-win-x64'
        - input: pipelineArtifact
          artifactName: 'cpp-native-win-arm64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-win-arm64'
        - input: pipelineArtifact
          artifactName: 'cpp-native-linux-x64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-linux-x64'
        - input: pipelineArtifact
          artifactName: 'cpp-native-osx-arm64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-osx-arm64'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-nuget'
          targetPath: '$(Build.ArtifactStagingDirectory)/nuget'
      steps:
      - template: steps-pack-nuget.yml
        parameters:
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          variant: base

  # ====================================================================
  # WinML: build Windows x64 + ARM64 + pack NuGet
  # ====================================================================
  - stage: cpp_build_winml
    displayName: 'C++ Native: Build + Pack (WinML)'
    dependsOn:
    - compute_version
    jobs:

    # ── Windows x64 (WinML) ──
    - job: build_win_x64_winml
      displayName: 'Build Windows x64 (WinML)'
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-win-x64-winml'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
      steps:
      - template: steps-build-windows.yml
        parameters:
          arch: x64
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersionWinml }}
          genaiVersion: ${{ parameters.genaiVersion }}
          winmlVersion: ${{ parameters.winmlVersion }}
          useWinml: true
          runTests: true
          stageHeaders: false

    # ── Windows ARM64 (WinML, cross-compile only) ──
    - job: build_win_arm64_winml
      displayName: 'Build Windows ARM64 (WinML)'
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-win-arm64-winml'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
      steps:
      - template: steps-build-windows.yml
        parameters:
          arch: arm64
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersionWinml }}
          genaiVersion: ${{ parameters.genaiVersion }}
          winmlVersion: ${{ parameters.winmlVersion }}
          useWinml: true
          runTests: false
          stageHeaders: false

    # ── Pack WinML NuGet (Windows x64 + arm64) ──
    - job: pack
      displayName: 'Pack NuGet (WinML)'
      dependsOn:
      - build_win_x64_winml
      - build_win_arm64_winml
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        - input: pipelineArtifact
          artifactName: 'cpp-native-win-x64-winml'
          targetPath: '$(Pipeline.Workspace)/cpp-native-win-x64-winml'
        - input: pipelineArtifact
          artifactName: 'cpp-native-win-arm64-winml'
          targetPath: '$(Pipeline.Workspace)/cpp-native-win-arm64-winml'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-nuget-winml'
          targetPath: '$(Build.ArtifactStagingDirectory)/nuget'
      steps:
      - template: steps-pack-nuget.yml
        parameters:
          ortVersion: ${{ parameters.ortVersionWinml }}
          genaiVersion: ${{ parameters.genaiVersion }}
          variant: winml
