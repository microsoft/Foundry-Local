# Inner steps to build one platform's Foundry Local Python SDK wheel.
#
# The caller is responsible for:
#   * placing the platform-native binaries (foundry_local.{dll,so,dylib}
#     and any sibling runtime DLLs) under `nativeArtifactDir`
#   * downloading the `version-info` pipeline artifact so this template
#     can read $(Pipeline.Workspace)/version-info/pyVersion.txt
#
# The wheel is per-platform — each pipeline job produces exactly one wheel
# containing one platform's native lib at
# src/foundry_local_sdk/_native/<rid>/.

parameters:
- name: nativeArtifactDir
  type: string
  displayName: 'Path to the downloaded cpp-native-<rid>[-winml] artifact directory'
- name: rid
  type: string
  displayName: 'Runtime identifier (win-x64, win-arm64, linux-x64, osx-arm64)'
- name: isWinML
  type: boolean
  default: false
- name: outputDir
  type: string
  default: '$(Build.ArtifactStagingDirectory)/python-sdk'
  displayName: 'Path to directory for the built wheel'
- name: targetArch
  type: string
  default: 'native'
  values: ['native', 'arm64']
  displayName: 'Cross-compile target arch on a Windows x64 host. Use "native" for no cross-compile.'
- name: pythonArchitecture
  type: string
  default: 'x64'
  values: ['x64', 'arm64']
  displayName: 'Architecture of the host Python interpreter (matches the agent OS arch).'

steps:

- task: UsePythonVersion@0
  displayName: 'Use Python 3.12'
  inputs:
    versionSpec: '3.12'
    addToPath: true
    architecture: '${{ parameters.pythonArchitecture }}'

- task: PowerShell@2
  displayName: 'Set package version from pyVersion.txt'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        $versionFile = "$(Pipeline.Workspace)/version-info/pyVersion.txt"
        if (-not (Test-Path $versionFile)) { throw "Missing $versionFile" }
        $v = (Get-Content $versionFile -Raw).Trim()
        Write-Host "Package version: $v"
        Write-Host "##vso[task.setvariable variable=packageVersion]$v"

- task: PowerShell@2
  displayName: 'Stamp version into pyproject.toml'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        $pyproject = "$(Build.SourcesDirectory)/sdk_v2/python/pyproject.toml"
        $content = Get-Content $pyproject -Raw
        # Replace the first occurrence of `version = "..."` inside the
        # [project] table. The backend shim handles the package-name
        # patch; here we only stamp the version.
        $patched = [regex]::Replace(
            $content,
            '(?m)^version\s*=\s*"[^"]*"',
            'version = "' + "$(packageVersion)" + '"',
            [System.Text.RegularExpressions.RegexOptions]::None,
            [TimeSpan]::FromSeconds(5))
        if ($patched -eq $content) { throw "Could not stamp version into $pyproject" }
        Set-Content -Path $pyproject -Value $patched -NoNewline
        Write-Host "Stamped version $(packageVersion) into pyproject.toml"

- task: PowerShell@2
  displayName: 'List downloaded native artifact'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        Write-Host "Contents of ${{ parameters.nativeArtifactDir }}:"
        Get-ChildItem "${{ parameters.nativeArtifactDir }}" -Recurse -File |
            ForEach-Object { Write-Host ("{0,12}  {1}" -f $_.Length, $_.FullName) }

- task: PowerShell@2
  displayName: 'Stage native lib into _native/${{ parameters.rid }}/'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        $dest = "$(Build.SourcesDirectory)/sdk_v2/python/src/foundry_local_sdk/_native/${{ parameters.rid }}"
        if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
        New-Item -ItemType Directory -Force -Path $dest | Out-Null

        # The native artifact is produced by steps-build-{windows,linux,macos}.yml
        # which is responsible for staging exactly the runtime closure that
        # ships with the wheel: foundry_local.{dll,so,dylib} plus all of its
        # vcpkg-shared transitive deps (azure-core, spdlog, fmt, libcurl,
        # openssl, zlib, brotli, ...) and PDBs. The artifact must NOT include
        # ORT or GenAI native libs — those come from pip deps
        # (onnxruntime-{core,gpu} / onnxruntime-genai-{core,cuda}). The
        # artifact must also NOT include test/example binaries.
        #
        # Filtering policy lives in the C++ staging templates so it's defined
        # once. Here we copy whatever the artifact contains.
        # *.lib is needed on Windows so the cffi extension build can link
        # against foundry_local.lib (import library). Other patterns cover
        # runtime payload across platforms.
        $patterns = @('*.dll', '*.lib', '*.so', '*.so.*', '*.dylib', '*.pdb')
        $copied = 0
        $seen = @{}
        foreach ($pat in $patterns) {
            Get-ChildItem "${{ parameters.nativeArtifactDir }}" -Recurse -File -Filter $pat -ErrorAction SilentlyContinue |
                ForEach-Object {
                    if (-not $seen.ContainsKey($_.FullName)) {
                        $seen[$_.FullName] = $true
                        Copy-Item $_.FullName -Destination $dest -Force
                        $copied++
                    }
                }
        }
        if ($copied -eq 0) {
            throw "No native libraries found under ${{ parameters.nativeArtifactDir }}"
        }
        Write-Host "Copied $copied native file(s) to $dest"
        Get-ChildItem $dest | ForEach-Object { Write-Host "  $($_.Name)" }

- task: PowerShell@2
  displayName: 'Clean stale build artifacts'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        $py = "$(Build.SourcesDirectory)/sdk_v2/python"
        # Remove stale, untagged cffi extension from prior dev compiles.
        # The wheel build below produces a properly ABI-tagged variant; the
        # untagged copy is bonus baggage we don't want shipped.
        $stale = "$py/src/foundry_local_sdk/_native/_cffi_bindings.pyd",
                 "$py/src/foundry_local_sdk/_native/_cffi_bindings.so",
                 "$py/src/foundry_local_sdk/_native/_cffi_bindings.dylib"
        foreach ($p in $stale) {
            if (Test-Path $p) {
                Remove-Item -Force $p
                Write-Host "Removed $p"
            }
        }
        foreach ($dir in @("$py/build", "$py/dist", "$py/src/foundry_local_sdk.egg-info")) {
            if (Test-Path $dir) {
                Remove-Item -Recurse -Force $dir
                Write-Host "Removed $dir"
            }
        }

- task: PowerShell@2
  displayName: 'Install build tooling'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        python -m pip install --upgrade pip
        python -m pip install --upgrade build setuptools wheel "cffi>=1.16"
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

- ${{ if eq(parameters.targetArch, 'arm64') }}:
  - task: PowerShell@2
    displayName: 'Initialize MSVC arm64 cross-tools (amd64_arm64)'
    inputs:
      targetType: inline
      pwsh: true
      script: |
          # cffi's PEP 517 build calls setuptools, which invokes cl.exe / link.exe
          # directly via distutils. On an x64 host targeting arm64 we must:
          #   1. Run vcvarsall amd64_arm64 to get a cross toolchain on PATH and
          #      arm64 INCLUDE/LIB dirs in env.
          #   2. Set DISTUTILS_USE_SDK=1 so setuptools skips its own vcvars probe
          #      and uses our env as-is (otherwise it re-runs vcvarsall for the
          #      host arch and clobbers everything).
          # We propagate every env var emitted by vcvarsall into ADO build vars
          # so it survives across PowerShell@2 step boundaries.
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) { throw "vswhere.exe not found at $vswhere" }
          $vsInstall = & $vswhere -latest -property installationPath
          if (-not $vsInstall) { throw "Could not locate a Visual Studio installation" }
          $vcvars = Join-Path $vsInstall 'VC\Auxiliary\Build\vcvarsall.bat'
          if (-not (Test-Path $vcvars)) { throw "vcvarsall.bat not found at $vcvars" }
          Write-Host "Using vcvarsall: $vcvars"

          # Snapshot env after vcvarsall amd64_arm64.
          $envDump = cmd /c "`"$vcvars`" amd64_arm64 > nul && set"
          if ($LASTEXITCODE -ne 0) { throw "vcvarsall amd64_arm64 failed (exit $LASTEXITCODE)" }

          $count = 0
          foreach ($line in $envDump) {
              if ($line -match '^([^=]+)=(.*)$') {
                  $name = $Matches[1]
                  $value = $Matches[2]
                  # Skip a few that we don't want to leak across steps.
                  if ($name -in @('PROMPT', 'PSModulePath', '_')) { continue }
                  Write-Host "##vso[task.setvariable variable=$name]$value"
                  $count++
              }
          }
          Write-Host "Propagated $count env var(s) from vcvarsall amd64_arm64"

          # Tell distutils/setuptools to trust the env we just set up.
          Write-Host "##vso[task.setvariable variable=DISTUTILS_USE_SDK]1"
          Write-Host "##vso[task.setvariable variable=MSSdk]1"

- task: PowerShell@2
  displayName: 'Build wheel'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        $outDir = "${{ parameters.outputDir }}"
        New-Item -ItemType Directory -Force -Path $outDir | Out-Null
        $isWinML = [bool]::Parse('${{ parameters.isWinML }}')
        if ($isWinML) {
            $env:FL_PYTHON_PACKAGE_NAME = 'foundry-local-sdk-winml'
            Write-Host "WinML variant: FL_PYTHON_PACKAGE_NAME=$env:FL_PYTHON_PACKAGE_NAME"
        } else {
            Remove-Item Env:FL_PYTHON_PACKAGE_NAME -ErrorAction SilentlyContinue
        }
        $targetArch = '${{ parameters.targetArch }}'
        $extraArgs = @()
        if ($targetArch -eq 'arm64') {
            # Force the wheel platform tag to win_arm64; otherwise bdist_wheel
            # tags it win_amd64 because the host interpreter is x64.
            $extraArgs += '--config-setting=--build-option=--plat-name=win_arm64'
            Write-Host "Cross-compile: forcing wheel plat tag win_arm64"
        }
        Push-Location "$(Build.SourcesDirectory)/sdk_v2/python"
        try {
            python -m build --wheel --outdir $outDir @extraArgs
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
        } finally {
            Pop-Location
        }

- task: PowerShell@2
  displayName: 'List produced wheel'
  inputs:
    targetType: inline
    pwsh: true
    script: |
        Get-ChildItem "${{ parameters.outputDir }}" -Filter '*.whl' |
            ForEach-Object { Write-Host ("{0,12}  {1}" -f $_.Length, $_.Name) }
