# Pre-download ORT / GenAI / (optionally) WinML NuGet packages from the
# AIFoundryLocal_PublicPackages ADO feed and emit cmake_extra_defines pointing
# at them. The feed has an upstream to nuget.org so new versions/dependencies
# are resolved automatically.
#
# Sets the pipeline variable `cmakeFetchDefines` containing the space-separated
# `KEY=PATH` pairs to pass to build.py --cmake_extra_defines.
#
# Parameters:
#   ortVersion     – Microsoft.ML.OnnxRuntime.Foundry version
#   genaiVersion   – Microsoft.ML.OnnxRuntimeGenAI.Foundry version
#   winmlVersion   – Microsoft.WindowsAppSDK.ML version (Windows only)
#   includeWinml   – Download WinML and emit WINML_EP_CATALOG_FETCH_URL
#   includeOrtGpuLinux – Also download Microsoft.ML.OnnxRuntime.Gpu.Linux (Linux only)
#   shell          – 'pwsh' (Windows/macOS) or 'bash' (Linux)

parameters:
- name: ortVersion
  type: string
- name: genaiVersion
  type: string
- name: winmlVersion
  type: string
  default: ''
- name: includeWinml
  type: boolean
  default: false
- name: includeOrtGpuLinux
  type: boolean
  default: false
- name: shell
  type: string
  values: ['pwsh', 'bash']

steps:

# Authenticate to the AIFoundryLocal_PublicPackages ADO feed so that
# nuget install can pull packages without raw HTTP downloads.
- task: NuGetAuthenticate@1
  displayName: 'Authenticate to ADO NuGet feed'

- ${{ if eq(parameters.shell, 'pwsh') }}:
  - task: PowerShell@2
    displayName: 'Pre-download NuGet packages'
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $ErrorActionPreference = 'Stop'
        $cacheDir = "$(Build.BinariesDirectory)/nuget_packages"
        New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null

        # Use the AIFoundryLocal_PublicPackages ADO feed (has an upstream to
        # nuget.org so new versions and transitive deps resolve automatically).
        $feed = 'https://pkgs.dev.azure.com/aiinfra/AIFoundryLocal/_packaging/AIFoundryLocal_PublicPackages/nuget/v3/index.json'

        $packages = @(
          @{ key = 'genai'; id = 'Microsoft.ML.OnnxRuntimeGenAI.Foundry'; version = '${{ parameters.genaiVersion }}' },
          @{ key = 'ort';   id = 'Microsoft.ML.OnnxRuntime.Foundry';     version = '${{ parameters.ortVersion }}'   }
        )
        if ($${{ parameters.includeOrtGpuLinux }}) {
          $packages += @{ key = 'ort_gpu_linux'; id = 'Microsoft.ML.OnnxRuntime.Gpu.Linux'; version = '${{ parameters.ortVersion }}' }
        }

        $defines = @()
        foreach ($pkg in $packages) {
          $pkgDir = "$cacheDir/$($pkg.key)-resolved"
          if (Test-Path $pkgDir) { Remove-Item -Recurse -Force $pkgDir }
          New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
          Write-Host "Downloading $($pkg.id) $($pkg.version)"
          nuget install $pkg.id `
            -Version $pkg.version `
            -OutputDirectory $pkgDir `
            -Source $feed `
            -DependencyVersion Ignore `
            -PackageSaveMode nupkg `
            -DirectDownload `
            -Verbosity quiet
          if ($LASTEXITCODE -ne 0) { throw "nuget install $($pkg.id) failed (exit $LASTEXITCODE)" }

          $nupkg = Get-ChildItem $pkgDir -Recurse -Filter "$($pkg.id).*.nupkg" |
            Select-Object -First 1
          if (-not $nupkg) { throw "$($pkg.id) .nupkg not found under $pkgDir after nuget install" }
          Write-Host "  -> $($nupkg.FullName) ($($nupkg.Length) bytes)"

          switch ($pkg.key) {
            'genai'         { $defines += "GENAI_FETCH_URL=$($nupkg.FullName)" }
            'ort'           { $defines += "ORT_FETCH_URL=$($nupkg.FullName)" }
            'ort_gpu_linux' { $defines += "ORT_GPU_LINUX_FETCH_URL=$($nupkg.FullName)" }
          }
        }

        if ($${{ parameters.includeWinml }}) {
          # WinML's bootstrap dep (Microsoft.WindowsAppSDK.Foundation) is a transitive dep of
          # Microsoft.WindowsAppSDK.ML, and nuget min-version semantics mean the exact min
          # version often isn't published — only later patches are. Defer to `nuget install`
          # so the real resolver picks a satisfying version.
          $winmlDir = "$cacheDir/winml-resolved"
          if (Test-Path $winmlDir) { Remove-Item -Recurse -Force $winmlDir }
          New-Item -ItemType Directory -Force -Path $winmlDir | Out-Null
          Write-Host "Resolving Microsoft.WindowsAppSDK.ML ${{ parameters.winmlVersion }} via nuget install"
          nuget install Microsoft.WindowsAppSDK.ML `
            -Version '${{ parameters.winmlVersion }}' `
            -OutputDirectory $winmlDir `
            -Source $feed `
            -DependencyVersion Lowest `
            -PackageSaveMode nupkg `
            -DirectDownload `
            -Verbosity quiet
          if ($LASTEXITCODE -ne 0) { throw "nuget install Microsoft.WindowsAppSDK.ML failed (exit $LASTEXITCODE)" }

          $mlNupkg = Get-ChildItem $winmlDir -Recurse -Filter 'Microsoft.WindowsAppSDK.ML.*.nupkg' |
            Select-Object -First 1
          $foundationNupkg = Get-ChildItem $winmlDir -Recurse -Filter 'Microsoft.WindowsAppSDK.Foundation.*.nupkg' |
            Select-Object -First 1
          if (-not $mlNupkg) { throw "Microsoft.WindowsAppSDK.ML .nupkg not found under $winmlDir after nuget install" }
          if (-not $foundationNupkg) { throw "Microsoft.WindowsAppSDK.Foundation .nupkg not found under $winmlDir after nuget install" }
          Write-Host "  -> $($mlNupkg.FullName) ($($mlNupkg.Length) bytes)"
          Write-Host "  -> $($foundationNupkg.FullName) ($($foundationNupkg.Length) bytes)"
          $defines += "WINML_EP_CATALOG_FETCH_URL=$($mlNupkg.FullName)"
          $defines += "WINAPPSDK_FOUNDATION_FETCH_URL=$($foundationNupkg.FullName)"
        }

        $joined = ($defines | ForEach-Object { "`"$_`"" }) -join ' '
        Write-Host "##vso[task.setvariable variable=cmakeFetchDefines]$joined"
        Write-Host "cmakeFetchDefines = $joined"

- ${{ if eq(parameters.shell, 'bash') }}:
  - bash: |
      set -euo pipefail
      cacheDir="$(Build.BinariesDirectory)/nuget_packages"
      mkdir -p "$cacheDir"

      # Use the AIFoundryLocal_PublicPackages ADO feed (has an upstream to
      # nuget.org so new versions and transitive deps resolve automatically).
      feed='https://pkgs.dev.azure.com/aiinfra/AIFoundryLocal/_packaging/AIFoundryLocal_PublicPackages/nuget/v3/index.json'

      declare -a entries=(
        "genai:Microsoft.ML.OnnxRuntimeGenAI.Foundry:${{ parameters.genaiVersion }}"
        "ort:Microsoft.ML.OnnxRuntime.Foundry:${{ parameters.ortVersion }}"
      )
      if [ "${{ parameters.includeWinml }}" = "True" ]; then
        # WinML is Windows-only; the bash branch should never receive includeWinml=true.
        echo "ERROR: includeWinml=true is not supported on the bash prefetch branch (WinML is Windows-only)." >&2
        exit 1
      fi
      if [ "${{ parameters.includeOrtGpuLinux }}" = "True" ]; then
        entries+=("ort_gpu_linux:Microsoft.ML.OnnxRuntime.Gpu.Linux:${{ parameters.ortVersion }}")
      fi

      defines=()
      for entry in "${entries[@]}"; do
        IFS=: read -r key id version <<< "$entry"
        pkgDir="$cacheDir/${key}-resolved"
        rm -rf "$pkgDir"
        mkdir -p "$pkgDir"
        echo "Downloading $id $version"
        nuget install "$id" \
          -Version "$version" \
          -OutputDirectory "$pkgDir" \
          -Source "$feed" \
          -DependencyVersion Ignore \
          -PackageSaveMode nupkg \
          -DirectDownload \
          -Verbosity quiet
        nupkg=$(find "$pkgDir" -iname "${id}.*.nupkg" | head -n1)
        if [ -z "$nupkg" ]; then
          echo "ERROR: $id .nupkg not found under $pkgDir after nuget install" >&2
          exit 1
        fi
        echo "  -> $nupkg ($(stat -c%s "$nupkg" 2>/dev/null || stat -f%z "$nupkg") bytes)"

        case "$key" in
          genai)         defines+=("\"GENAI_FETCH_URL=$nupkg\"") ;;
          ort)           defines+=("\"ORT_FETCH_URL=$nupkg\"") ;;
          ort_gpu_linux) defines+=("\"ORT_GPU_LINUX_FETCH_URL=$nupkg\"") ;;
        esac
      done

      joined="${defines[*]}"
      echo "##vso[task.setvariable variable=cmakeFetchDefines]$joined"
      echo "cmakeFetchDefines = $joined"
    displayName: 'Pre-download NuGet packages'
