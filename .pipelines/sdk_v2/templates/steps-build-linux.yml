# Reusable Linux build steps for the Foundry Local C++ SDK.
#
# Pool: onnxruntime-Ubuntu2404-AMD-CPU. Has the toolchain pre-installed but we
# still bootstrap vcpkg and pre-download NuGet packages from the aiinfra feed
# for version pinning.

parameters:
- name: buildConfig
  type: string
- name: ortVersion
  type: string
- name: genaiVersion
  type: string
- name: runTests
  type: boolean
  default: false

steps:

- bash: |
    set -euo pipefail
    git clone https://github.com/microsoft/vcpkg.git "$(Build.BinariesDirectory)/vcpkg"
    "$(Build.BinariesDirectory)/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
  displayName: 'Bootstrap vcpkg'

- template: steps-prefetch-nuget.yml
  parameters:
    ortVersion: ${{ parameters.ortVersion }}
    genaiVersion: ${{ parameters.genaiVersion }}
    winmlVersion: ''
    includeWinml: false
    includeOrtGpuLinux: true
    shell: bash

# Bake the pipeline-computed version into the binary so FoundryLocalGetVersionString()
# matches the .nupkg version instead of the cmake default.
- bash: |
    set -euo pipefail
    version=$(cat "$(Pipeline.Workspace)/version-info/sdkVersion.txt" | tr -d '[:space:]')
    defines="$(cmakeFetchDefines) \"FOUNDRY_LOCAL_VERSION_STRING=$version\""
    echo "##vso[task.setvariable variable=cmakeFetchDefines]$defines"
    echo "cmakeFetchDefines = $defines"
  displayName: 'Append version define'

- ${{ if eq(parameters.runTests, true) }}:
  - template: ../../templates/checkout-steps.yml@self
    parameters:
      repoName: test-data-shared
      basePath: '$(Agent.BuildDirectory)'

- bash: |
    set -euo pipefail
    python3 build.py --configure --build \
      --config ${{ parameters.buildConfig }} \
      --cmake_extra_defines $(cmakeFetchDefines)
  displayName: 'Configure and build'
  workingDirectory: $(Build.SourcesDirectory)/sdk_v2/cpp
  env:
    VCPKG_ROOT: $(Build.BinariesDirectory)/vcpkg

- ${{ if eq(parameters.runTests, true) }}:
  - bash: |
      set -euo pipefail
      python3 build.py --test --config ${{ parameters.buildConfig }}
    displayName: 'Run tests'
    workingDirectory: $(Build.SourcesDirectory)/sdk_v2/cpp
    env:
      VCPKG_ROOT: $(Build.BinariesDirectory)/vcpkg
      TEST_MODEL_CACHE_DIR: $(Agent.BuildDirectory)/test-data-shared

- bash: |
    echo "=== vcpkg buildtrees error logs ==="
    find "$(Build.BinariesDirectory)/vcpkg/buildtrees" -name "*err.log" -exec echo "--- {} ---" \; -exec cat {} \; || true
    echo "=== vcpkg buildtrees config output logs ==="
    find "$(Build.BinariesDirectory)/vcpkg/buildtrees" -name "config-*-out.log" -exec echo "--- {} ---" \; -exec tail -100 {} \; || true
  displayName: 'Dump vcpkg error logs'
  condition: failed()

# Stage the full runtime closure of libfoundry_local.so. vcpkg uses shared linkage,
# so libfoundry_local.so has transitive dependencies (azure-*, spdlog, fmt, libcurl,
# libssl/libcrypto, zlib, brotli*) that must sit beside it at load time.
#
# Excluded:
#   - libonnxruntime*: ORT/GenAI are supplied by pip on the Python wheel side and
#     by NuGet on the C# side; shipping them here would conflict.
#   - *_tests* / *_example* / libgtest* / cmake_test_discovery_*: build-time test
#     and example artifacts; not part of the redistributable surface.
- bash: |
    set -euo pipefail
    src='$(Build.SourcesDirectory)/sdk_v2/cpp/build/Linux/${{ parameters.buildConfig }}/bin'
    dst='$(Build.ArtifactStagingDirectory)/native'
    mkdir -p "$dst"

    # Match .so, versioned .so.X[.Y[.Z]], and the lib*.so symlinks/files.
    shopt -s nullglob
    candidates=( "$src"/*.so "$src"/*.so.* "$src"/lib*.so* )

    staged=0
    for f in "${candidates[@]}"; do
      name=$(basename "$f")
      case "$name" in
        libonnxruntime*|*_tests*|*_example*|libgtest*|cmake_test_discovery_*) continue ;;
      esac
      cp -P "$f" "$dst/"
      echo "  staged $name"
      staged=$((staged + 1))
    done

    if [ ! -e "$dst/libfoundry_local.so" ]; then
      echo "ERROR: libfoundry_local.so was not staged from $src" >&2
      exit 1
    fi
    echo "Staged $staged file(s) to $dst"
  displayName: 'Stage native artifacts'
