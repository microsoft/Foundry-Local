    # ── Build FLC (WinML) ──
    - stage: build_core_winml
      displayName: 'Build Core (WinML)'
      dependsOn: compute_version
      jobs:
      - job: flc_winml_win_x64
        displayName: 'win-x64 (WinML)'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-winml-win-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: win-x64
            platform: x64
            isWinML: true

      - job: flc_winml_win_arm64
        displayName: 'win-arm64 (WinML)'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-winml-win-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: win-arm64
            platform: arm64
            isWinML: true

      - job: package_flc_winml
        displayName: 'Package Core (WinML)'
        dependsOn:
        - flc_winml_win_x64
        - flc_winml_win_arm64
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-nuget-winml'
            targetPath: '$(Build.ArtifactStagingDirectory)/flc-nuget'
          - output: pipelineArtifact
            artifactName: 'flc-wheels-winml'
            targetPath: '$(Build.ArtifactStagingDirectory)/flc-wheels'
          - output: pipelineArtifact
            artifactName: 'deps-versions-winml'
            targetPath: '$(Build.ArtifactStagingDirectory)/deps-versions'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-winml-win-x64'
            targetPath: '$(Pipeline.Workspace)/flc-winml-win-x64'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-winml-win-arm64'
            targetPath: '$(Pipeline.Workspace)/flc-winml-win-arm64'
        - task: PowerShell@2
          displayName: 'List downloaded WinML platform artifacts'
          inputs:
            targetType: inline
            script: |
              foreach ($name in @('flc-winml-win-x64','flc-winml-win-arm64')) {
                $dir = "$(Pipeline.Workspace)/$name"
                Write-Host "Contents of ${dir}:"
                if (Test-Path $dir) { Get-ChildItem $dir -Recurse | ForEach-Object { Write-Host $_.FullName } }
                else { Write-Host "  (directory not found)" }
              }
        - template: .pipelines/templates/package-core-steps.yml@self
          parameters:
            isWinML: true
            platforms:
            - name: win-x64
              artifactName: flc-winml-win-x64
            - name: win-arm64
              artifactName: flc-winml-win-arm64

