# Foundry Local Packaging Pipeline
#
# Builds Foundry Local Core from neutron-server (windows.ai.toolkit project),
# then packages the SDKs from this repo using the built Core.
#
# Produces artifacts: flc-nuget, flc-nuget-winml, flc-wheels, flc-wheels-winml,
#   cs-sdk, cs-sdk-winml, js-sdk, js-sdk-winml, python-sdk, python-sdk-winml,
#   rust-sdk, rust-sdk-winml

pr:
- main
- releases/*

name: $(Date:yyyyMMdd).$(Rev:r)

parameters:
- name: prereleaseId
  displayName: 'Pre-release identifier (e.g. rc1, beta).'
  type: string
  default: 'none'
- name: isRelease
  displayName: 'Release build'
  type: boolean
  default: false
- name: neutronServerBranch
  displayName: 'Foundry Local Core branch (windows.ai.toolkit/neutron-server)'
  type: string
  default: 'dev/FoundryLocalCore/main'

variables:
- group: FoundryLocal-ESRP-Signing

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    pool:
      # default all windows jobs, individual jobs override
      name: onnxruntime-Win-CPU-2022
      os: windows
    sdl:
      binskim:
        break: false
        scanOutputDirectoryOnly: true
    stages:
    # ── Compute Version ──
    # A single version is computed from the selected Foundry Local Core branch
    # and shared across all stages. This keeps SDK packages aligned with Core
    # while still producing ecosystem-specific format variants:
    #   sdkVersion  – SemVer for JS, C#, Rust
    #   pyVersion   – PEP 440 for Python
    #   flcVersion  – NuGet/FLC style
    - stage: compute_version
      displayName: 'Compute Version'
      dependsOn: []
      jobs:
      - job: version
        displayName: 'Compute Version'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Build.ArtifactStagingDirectory)/version-info'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
        - task: UseDotNet@2
          displayName: 'Use .NET SDK from Foundry Local Core'
          inputs:
            packageType: sdk
            useGlobalJson: true
            workingDirectory: '$(Build.SourcesDirectory)/neutron-server'
        - task: PowerShell@2
          displayName: 'Compute versions from Foundry Local Core'
          inputs:
            targetType: inline
            script: |
              $ErrorActionPreference = 'Stop'

              $nsRoot = "$(Build.SourcesDirectory)/neutron-server"
              $preId = ("${{ parameters.prereleaseId }}").Trim()
              if ($preId -eq 'none') { $preId = '' }
              $isRelease = "${{ parameters.isRelease }}" -eq "True"

              $previousPublicRelease = $env:PublicRelease
              Push-Location $nsRoot
              try {
                if ($isRelease) {
                  $env:PublicRelease = "true"
                }

                if (Test-Path ".config/dotnet-tools.json") {
                  dotnet tool restore
                  if ($LASTEXITCODE -ne 0) { throw "dotnet tool restore failed" }
                  $versionJson = & dotnet tool run nbgv -- get-version -p $nsRoot -f json
                } else {
                  $toolPath = "$(Agent.TempDirectory)/nbgv"
                  New-Item -ItemType Directory -Path $toolPath -Force | Out-Null
                  $nbgv = Join-Path $toolPath "nbgv.exe"
                  if (Test-Path $nbgv) {
                    dotnet tool update nbgv --tool-path $toolPath --version 3.7.115
                  } else {
                    dotnet tool install nbgv --tool-path $toolPath --version 3.7.115
                  }
                  if ($LASTEXITCODE -ne 0) { throw "installing nbgv failed" }
                  $versionJson = & $nbgv get-version -p $nsRoot -f json
                }
                if ($LASTEXITCODE -ne 0) { throw "nbgv get-version failed" }
              } finally {
                if ($null -eq $previousPublicRelease) {
                  Remove-Item Env:\PublicRelease -ErrorAction SilentlyContinue
                } else {
                  $env:PublicRelease = $previousPublicRelease
                }
                Pop-Location
              }

              $versionInfo = $versionJson | ConvertFrom-Json
              $coreCommitId = (git -C $nsRoot rev-parse HEAD).Trim()
              if ([string]::IsNullOrWhiteSpace($coreCommitId)) {
                throw "Failed to resolve Foundry Local Core commit"
              }

              $simpleVersion = [string]$versionInfo.SimpleVersion
              if ([string]::IsNullOrWhiteSpace($simpleVersion)) {
                throw "NBGV did not return SimpleVersion"
              }

              if ($preId -ne '' -and $preId -ne 'none') {
                $sdkVersion = "$simpleVersion-$preId"
                $pyVersion  = "$simpleVersion$preId"
                $flcVersion = "$simpleVersion-$preId"
              } else {
                $flcVersion = [string]$versionInfo.NuGetPackageVersion
                $sdkVersion = [string]$versionInfo.NpmPackageVersion
                if ([string]::IsNullOrWhiteSpace($sdkVersion)) {
                  $sdkVersion = [string]$versionInfo.SemVer2
                }

                if ($isRelease -and $flcVersion -match '-g[0-9a-fA-F]+$') {
                  $flcVersion = $simpleVersion
                }
                if ($isRelease -and $sdkVersion -match '-g[0-9a-fA-F]+$') {
                  $sdkVersion = $simpleVersion
                }

                if ($versionInfo.PublicRelease -or $isRelease) {
                  $pyVersion = $simpleVersion
                } else {
                  $pyVersion = "$simpleVersion.dev$($versionInfo.VersionHeight)"
                }
              }

              $sdkVersion = $sdkVersion.Split('+')[0]
              $flcVersion = $flcVersion.Split('+')[0]

              foreach ($entry in @(
                @{ Name = "SDK version"; Value = $sdkVersion },
                @{ Name = "Python version"; Value = $pyVersion },
                @{ Name = "FLC version"; Value = $flcVersion }
              )) {
                if ([string]::IsNullOrWhiteSpace($entry.Value)) {
                  throw "$($entry.Name) was empty"
                }
              }

              $outDir = "$(Build.ArtifactStagingDirectory)/version-info"
              New-Item -ItemType Directory -Path $outDir -Force | Out-Null

              $utf8NoBom = [System.Text.UTF8Encoding]::new($false)
              [System.IO.File]::WriteAllText("$outDir/sdkVersion.txt", $sdkVersion, $utf8NoBom)
              [System.IO.File]::WriteAllText("$outDir/pyVersion.txt",  $pyVersion,  $utf8NoBom)
              [System.IO.File]::WriteAllText("$outDir/flcVersion.txt", $flcVersion, $utf8NoBom)
              [System.IO.File]::WriteAllText("$outDir/neutronServerCommit.txt", $coreCommitId, $utf8NoBom)

              $versions = [ordered]@{
                sdkVersion = $sdkVersion
                pythonVersion = $pyVersion
                flcVersion = $flcVersion
                coreNuGetPackageVersion = $versionInfo.NuGetPackageVersion
                coreNpmPackageVersion = $versionInfo.NpmPackageVersion
                coreInformationalVersion = $versionInfo.AssemblyInformationalVersion
                coreVersionHeight = $versionInfo.VersionHeight
                corePublicRelease = $versionInfo.PublicRelease
                coreCommitId = $coreCommitId
                coreBranch = "${{ parameters.neutronServerBranch }}"
              } | ConvertTo-Json
              [System.IO.File]::WriteAllText("$outDir/versions.json", $versions, $utf8NoBom)

              Write-Host "SDK version: $sdkVersion"
              Write-Host "Python version: $pyVersion"
              Write-Host "FLC version: $flcVersion"
              Write-Host "FLC informational version: $($versionInfo.AssemblyInformationalVersion)"
              Write-Host "FLC commit: $coreCommitId"

    # ── Build FLC ──
    - stage: build_core
      displayName: 'Build Core'
      dependsOn: compute_version
      jobs:
      - job: flc_win_x64
        displayName: 'win-x64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-win-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: win-x64
            platform: x64

      - job: flc_win_arm64
        displayName: 'win-arm64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-win-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: win-arm64
            platform: arm64

      - job: flc_linux_x64
        displayName: 'linux-x64'
        pool:
          name: onnxruntime-Ubuntu2404-AMD-CPU
          os: linux
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-linux-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: linux-x64
            platform: x64

      - job: flc_osx_arm64
        displayName: 'osx-arm64'
        pool:
          name: AcesShared
          os: macOS
          demands:
          - ImageOverride -equals ACES_VM_SharedPool_Sequoia
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-osx-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        # AcesShared macOS agents don't have git-lfs pre-installed
        - script: brew install git-lfs && git lfs install
          displayName: 'Install Git LFS'
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: osx-arm64
            platform: arm64

      - job: package_flc
        displayName: 'Package Core'
        dependsOn:
        - flc_win_x64
        - flc_win_arm64
        - flc_linux_x64
        - flc_osx_arm64
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Build.ArtifactStagingDirectory)/flc-nuget'
          - output: pipelineArtifact
            artifactName: 'flc-wheels'
            targetPath: '$(Build.ArtifactStagingDirectory)/flc-wheels'
          - output: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Build.ArtifactStagingDirectory)/deps-versions'
        steps:
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: neutron-server
            ref: refs/heads/${{ parameters.neutronServerBranch }}
            refFile: '$(Pipeline.Workspace)/version-info/neutronServerCommit.txt'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-win-x64'
            targetPath: '$(Pipeline.Workspace)/flc-win-x64'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-win-arm64'
            targetPath: '$(Pipeline.Workspace)/flc-win-arm64'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-linux-x64'
            targetPath: '$(Pipeline.Workspace)/flc-linux-x64'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-osx-arm64'
            targetPath: '$(Pipeline.Workspace)/flc-osx-arm64'
        - task: PowerShell@2
          displayName: 'List downloaded platform artifacts'
          inputs:
            targetType: inline
            script: |
              foreach ($name in @('flc-win-x64','flc-win-arm64','flc-linux-x64','flc-osx-arm64')) {
                $dir = "$(Pipeline.Workspace)/$name"
                Write-Host "Contents of ${dir}:"
                if (Test-Path $dir) { Get-ChildItem $dir -Recurse | ForEach-Object { Write-Host $_.FullName } }
                else { Write-Host "  (directory not found)" }
              }
        - template: .pipelines/templates/package-core-steps.yml@self
          parameters:
            isWinML: false
            platforms:
            - name: win-x64
              artifactName: flc-win-x64
            - name: win-arm64
              artifactName: flc-win-arm64
            - name: linux-x64
              artifactName: flc-linux-x64
            - name: osx-arm64
              artifactName: flc-osx-arm64

    # ── Build C# SDK ──
    - stage: build_cs
      displayName: 'Build C# SDK'
      dependsOn:
      - build_core
      jobs:
      - job: cs_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'cs-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/cs-sdk'
        steps:
        - checkout: self
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-cs-steps.yml@self
          parameters:
            isWinML: false
            flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

    # ── Build JS Node-API Addon (all platforms) ──
    - stage: build_js_addon
      displayName: 'Build JS Addon'
      dependsOn: []
      jobs:
      - job: js_addon_win_x64
        displayName: 'Addon win32-x64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-win32-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/win32-x64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

      - job: js_addon_win_arm64
        displayName: 'Addon win32-arm64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-win32-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
            targetArch: arm64
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/win32-arm64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

      - job: js_addon_linux_x64
        displayName: 'Addon linux-x64'
        pool:
          name: onnxruntime-Ubuntu2404-AMD-CPU
          os: linux
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-linux-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/linux-x64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

      - job: js_addon_osx_arm64
        displayName: 'Addon osx-arm64'
        pool:
          name: Azure Pipelines
          vmImage: 'macOS-15'
          os: macOS
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-darwin-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
            targetArch: arm64
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/darwin-arm64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

    # ── Build JS SDK ──
    - stage: build_js
      displayName: 'Build JS SDK'
      dependsOn:
      - build_core
      - build_js_addon
      jobs:
      - job: js_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-sdk'
        steps:
        - checkout: self
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared

        # Download prebuilt Node-API addons for all platforms
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (win32-x64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-win32-x64'
            targetPath: '$(Pipeline.Workspace)/js-addon-win32-x64'
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (win32-arm64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-win32-arm64'
            targetPath: '$(Pipeline.Workspace)/js-addon-win32-arm64'
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (linux-x64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-linux-x64'
            targetPath: '$(Pipeline.Workspace)/js-addon-linux-x64'
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (osx-arm64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-darwin-arm64'
            targetPath: '$(Pipeline.Workspace)/js-addon-darwin-arm64'

        - task: PowerShell@2
          displayName: 'Place prebuilt addons'
          inputs:
            targetType: inline
            script: |
              $multiCheckout = "$(Build.SourcesDirectory)/Foundry-Local"
              if (Test-Path $multiCheckout) { $repoRoot = $multiCheckout } else { $repoRoot = "$(Build.SourcesDirectory)" }
              $prebuildsDir = "$repoRoot/sdk/js/prebuilds"
              foreach ($platform in @('win32-x64','win32-arm64','linux-x64','darwin-arm64')) {
                $src = "$(Pipeline.Workspace)/js-addon-$platform/foundry_local_napi.node"
                $destDir = "$prebuildsDir/$platform"
                New-Item -ItemType Directory -Path $destDir -Force | Out-Null
                Copy-Item $src "$destDir/foundry_local_napi.node" -Force
                Write-Host "Placed addon for $platform ($($(Get-Item $src).Length) bytes)"
              }

        - template: .pipelines/templates/build-js-steps.yml@self
          parameters:
            isWinML: false
            flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

    # ── Build Python SDK ──
    - stage: build_python
      displayName: 'Build Python SDK'
      dependsOn:
      - build_core
      jobs:
      - job: python_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-wheels'
            targetPath: '$(Pipeline.Workspace)/flc-wheels'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'python-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/python-sdk'
        steps:
        - checkout: self
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-python-steps.yml@self
          parameters:
            isWinML: false
            flcWheelsDir: '$(Pipeline.Workspace)/flc-wheels'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

    # ── Build Rust SDK ──
    - stage: build_rust
      displayName: 'Build Rust SDK'
      dependsOn:
      - build_core
      jobs:
      - job: rust_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'rust-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/rust-sdk'
        steps:
        - checkout: self
        - template: .pipelines/templates/checkout-steps.yml@self
          parameters:
            repoName: test-data-shared
        - template: .pipelines/templates/build-rust-steps.yml@self
          parameters:
            isWinML: false
