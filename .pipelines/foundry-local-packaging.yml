# Foundry Local Packaging Pipeline
#
# Builds Foundry Local Core from neutron-server (windows.ai.toolkit project),
# then packages the C# and JS SDKs from this repo using the built Core.
#
# Produces artifacts: flc-nuget, flc-nuget-winml, flc-wheels, flc-wheels-winml,
#   cs-sdk, cs-sdk-winml, js-sdk, js-sdk-winml, python-sdk, python-sdk-winml,
#   rust-sdk, rust-sdk-winml

# CI: only auto-run on pushes to main / release branches. Without an explicit
# trigger block, ADO defaults to "every commit on every branch", which fires
# this expensive pipeline on every dev branch push.
#
# TODO: This prevents auto-run on all pushes but doesn't trigger commits to `main` and `release`
#       branches. Re-enable when triggering is fixed. 
# trigger:
#   branches:
#     include:
#       - main
#       - releases/*

pr:
- main
- releases/*

name: $(Date:yyyyMMdd).$(Rev:r)

parameters:
- name: version
  displayName: 'Package version (sdk_v2/...)'
  type: string
  default: '2.0.0'
- name: versionV1
  displayName: 'Package version (sdk/...)'
  type: string
  default: '1.3.0'
- name: prereleaseId
  displayName: 'Pre-release identifier (e.g. rc1, beta).'
  type: string
  default: 'none'
- name: isRelease
  displayName: 'Release build'
  type: boolean
  default: false
- name: buildV1
  displayName: 'Force build v1 sdk. If unchecked, auto-detected from PR changes.'
  type: boolean
  default: false
- name: neutronServerBranch
  displayName: 'Foundry Local Core branch (windows.ai.toolkit/neutron-server)'
  type: string
  default: 'dev/FoundryLocalCore/main'

variables:
- group: FoundryLocal-ESRP-Signing
# C++ SDK (sdk_v2/cpp) native dependency versions. Must match cmake defaults
# in sdk_v2/deps_versions.json and sdk_v2/deps_versions_winml.json.
- name: cppOrtVersion
  value: '1.25.1'
- name: cppOrtVersionWinml
  # Pinned to the WinML-aligned ORT line so foundry_local.dll's ORT ABI matches
  # the WinML EP catalog plugins it loads. See FindOnnxRuntime.cmake.
  value: '1.23.2.3'
- name: cppGenaiVersion
  value: '0.13.2'
- name: cppWinmlVersion
  value: '1.8.2192'
- name: cppBuildConfig
  value: 'RelWithDebInfo'

resources:
  repositories:
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    pool:
      # default all windows jobs, individual jobs override
      name: onnxruntime-Win-CPU-2022
      os: windows
    sdl:
      binskim:
        break: false
        scanOutputDirectoryOnly: true
    stages:
    # ── Detect Changed Paths ──
    # Decides whether sdk/ (v1) and sdk_v2/ (v2) branches should run.
    # Emits two output variables on the `setflags` job: `buildV1` and `buildV2` (each "true"/"false").
    #
    # Rules:
    #   * `buildV1` parameter set true => buildV1 = true; otherwise auto-detect from sdk/* changes.
    #   * `buildV2` = true iff this branch has changes under sdk_v2/ relative to its base.
    #     Base is the PR target branch when available, else origin/main. If that range is empty
    #     (e.g. post-merge CI build of main itself), fall back to the latest commit's diff so a merge
    #     that touched sdk_v2/ still triggers v2. Branches forked off something other than main and
    #     built outside a PR will over-trigger; that's acceptable — release branches aren't expected
    #     to touch sdk_v2/.
    - stage: detect_changes
      displayName: 'Detect Changed Paths'
      dependsOn: []
      jobs:
      - job: setflags
        displayName: 'Compute build flags'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        steps:
        - checkout: self
          fetchDepth: 0
        - task: PowerShell@2
          name: setflags
          displayName: 'Detect changed paths and set buildV1/buildV2'
          inputs:
            targetType: inline
            pwsh: true
            script: |
              $forceV1 = "${{ parameters.buildV1 }}" -eq "True"

              if ($forceV1) {
                $buildV1 = $true
                Write-Host "Manual override: buildV1=$buildV1"
              } else {
                # Read via env var so PowerShell doesn't mis-parse the literal
                # '$(System.PullRequest.TargetBranch)' as a subexpression when
                # ADO leaves it unresolved on non-PR runs. Env var is empty
                # (not undefined) when the variable isn't set.
                $prTarget = $env:SYSTEM_PULLREQUEST_TARGETBRANCH
                if (-not [string]::IsNullOrEmpty($prTarget)) {
                  # Typically "refs/heads/<branch>"; normalize to a short name for git fetch + origin/<branch> refs.
                  $baseBranch = $prTarget -replace '^refs/heads/', ''
                  Write-Host "Base branch (from PR target): $baseBranch"
                } else {
                  $baseBranch = "main"
                  Write-Host "Base branch (fallback): $baseBranch"
                }

                git fetch --no-tags --depth=50 origin $baseBranch 2>&1 | Out-Null
                $diffRange = "origin/$baseBranch...HEAD"
                $changed = @(git diff --name-only $diffRange)
                Write-Host "Changed files vs $diffRange ($($changed.Count)):"
                $changed | ForEach-Object { Write-Host "  $_" }

                # On a build of the base branch itself (e.g. post-merge CI on main),
                # the range above is empty. Fall back to the latest commit's diff so
                # a merge that touched sdk/ or sdk_v2/ still triggers the respective version.
                if ($changed.Count -eq 0) {
                  $diffRange = "HEAD~1...HEAD"
                  $changed = @(git diff --name-only $diffRange)
                  Write-Host "Empty range vs base; falling back to $diffRange ($($changed.Count)):"
                  $changed | ForEach-Object { Write-Host "  $_" }
                }

                $buildV1 = @($changed | Where-Object { $_ -like 'sdk/*' }).Count -gt 0
                Write-Host "Auto-detected: buildV1=$buildV1"
              }

              # Compute buildV2: changes to sdk_v2/
              $prTarget = $env:SYSTEM_PULLREQUEST_TARGETBRANCH
              if (-not [string]::IsNullOrEmpty($prTarget)) {
                $baseBranch = $prTarget -replace '^refs/heads/', ''
              } else {
                $baseBranch = "main"
              }
              git fetch --no-tags --depth=50 origin $baseBranch 2>&1 | Out-Null
              $diffRange = "origin/$baseBranch...HEAD"
              $changedV2 = @(git diff --name-only $diffRange)
              if ($changedV2.Count -eq 0) {
                $diffRange = "HEAD~1...HEAD"
                $changedV2 = @(git diff --name-only $diffRange)
              }
              $buildV2 = @($changedV2 | Where-Object { $_ -like 'sdk_v2/*' }).Count -gt 0
              Write-Host "Auto-detected: buildV2=$buildV2"

              $v1 = $buildV1.ToString().ToLower()
              Write-Host "##vso[task.setvariable variable=buildV1;isOutput=true]$v1"
              $v2 = $buildV2.ToString().ToLower()
              Write-Host "##vso[task.setvariable variable=buildV2;isOutput=true]$v2"

    # ── Compute Version ──
    # A single version string is computed once and shared across all stages.
    # This prevents timestamp drift between standard and WinML builds.
    # Outputs (written to the `version-info` pipeline artifact):
    #   sdk_v2 (no suffix; FLC is legacy-only and not emitted here):
    #     sdkVersion.txt    – semver for C#       (e.g. X.Y.Z-dev.202604061234)
    #     pyVersion.txt     – PEP 440 for Python  (e.g. X.Y.Z.dev202604061234)
    #   Legacy sdk/ (.v1. suffix):
    #     sdkVersion.v1.txt – semver for JS, C#, Rust
    #     pyVersion.v1.txt  – PEP 440 for Python
    #     flcVersion.v1.txt – NuGet/FLC style
    - stage: compute_version
      displayName: 'Compute Version'
      dependsOn: []
      jobs:
      - job: version
        displayName: 'Compute Version'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Build.ArtifactStagingDirectory)/version-info'
        steps:
        - checkout: none
        - task: PowerShell@2
          displayName: 'Compute and write version files'
          inputs:
            targetType: inline
            script: |
              $preId = "${{ parameters.prereleaseId }}"
              $ts = Get-Date -Format "yyyyMMddHHmm"
              $commitId = "$(Build.SourceVersion)".Substring(0, 8)

              function Compute-Versions([string]$base, [bool]$includeFlc) {
                if ($preId -ne '' -and $preId -ne 'none') {
                  $result = @{
                    sdk = "$base-$preId"
                    py  = "$base$preId"
                  }
                  if ($includeFlc) { $result.flc = "$base-$preId" }
                  return $result
                } elseif ("${{ parameters.isRelease }}" -ne "True") {
                  $result = @{
                    sdk = "$base-dev.$ts"
                    py  = "$base.dev$ts"
                  }
                  if ($includeFlc) { $result.flc = "$base-dev-$ts-$commitId" }
                  return $result
                } else {
                  $result = @{
                    sdk = $base
                    py  = $base
                  }
                  if ($includeFlc) { $result.flc = $base }
                  return $result
                }
              }

              $v2 = Compute-Versions "${{ parameters.version }}"   $false
              $v1 = Compute-Versions "${{ parameters.versionV1 }}" $true

              $outDir = "$(Build.ArtifactStagingDirectory)/version-info"
              New-Item -ItemType Directory -Path $outDir -Force | Out-Null

              # sdk_v2 versions (canonical, no suffix). No flcVersion — v2
              # does not consume Foundry Local Core.
              Set-Content -Path "$outDir/sdkVersion.txt" -Value $v2.sdk -NoNewline
              Set-Content -Path "$outDir/pyVersion.txt"  -Value $v2.py  -NoNewline

              # Legacy sdk/ versions (.v1. suffix).
              Set-Content -Path "$outDir/sdkVersion.v1.txt" -Value $v1.sdk -NoNewline
              Set-Content -Path "$outDir/pyVersion.v1.txt"  -Value $v1.py  -NoNewline
              Set-Content -Path "$outDir/flcVersion.v1.txt" -Value $v1.flc -NoNewline

              Write-Host "v2 SDK version:    $($v2.sdk)"
              Write-Host "v2 Python version: $($v2.py)"
              Write-Host "v1 SDK version:    $($v1.sdk)"
              Write-Host "v1 Python version: $($v1.py)"
              Write-Host "v1 FLC version:    $($v1.flc)"

    # -- sdk_v1 (sdk/) C++ Core (FLC) + C# / JS / Python / Rust SDKs --
    # Entire subgraph is gated by a single artificial root stage (`v1_gate`)
    # defined inside stages-sdk-v1.yml. When detect_changes.buildV1 is false,
    # v1_gate is skipped and every downstream v1 stage skips via the default
    # `succeeded()` cascade.
    - template: v1/templates/stages-sdk-v1.yml
      parameters:
        gateCondition: eq(dependencies.detect_changes.outputs['setflags.setflags.buildV1'], 'true')
        gateDependsOn: [detect_changes]
        version: ${{ parameters.versionV1 }}
        prereleaseId: ${{ parameters.prereleaseId }}
        isRelease: ${{ parameters.isRelease }}
        neutronServerBranch: ${{ parameters.neutronServerBranch }}


    # ── sdk_v2 (C++ native + C# SDK + Python SDK) ──
    # Built only when changes are detected in sdk_v2/.
    - template: v2/templates/stages-sdk-v2.yml
      parameters:
        gateCondition: eq(dependencies.detect_changes.outputs['setflags.setflags.buildV2'], 'true')
        gateDependsOn: [detect_changes]
        buildConfig: $(cppBuildConfig)
        ortVersion: $(cppOrtVersion)
        ortVersionWinml: $(cppOrtVersionWinml)
        genaiVersion: $(cppGenaiVersion)
        winmlVersion: $(cppWinmlVersion)
