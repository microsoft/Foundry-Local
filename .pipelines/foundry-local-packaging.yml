# Foundry Local Packaging Pipeline
#
# Builds Foundry Local Core from neutron-server (windows.ai.toolkit project),
# then packages the C# and JS SDKs from this repo using the built Core.
#
# Produces artifacts: flc-nuget, flc-nuget-winml, flc-wheels, flc-wheels-winml,
#   cs-sdk, cs-sdk-winml, js-sdk, js-sdk-winml, python-sdk, python-sdk-winml,
#   rust-sdk, rust-sdk-winml

pr:
- main
- releases/*

name: $(Date:yyyyMMdd).$(Rev:r)

parameters:
- name: version
  displayName: 'Package version'
  type: string
  default: '1.0.0'
- name: prereleaseId
  displayName: 'Pre-release identifier (e.g. rc1, beta).'
  type: string
  default: 'none'
- name: isRelease
  displayName: 'Release build'
  type: boolean
  default: false
- name: neutronServerBranch
  displayName: 'Foundry Local Core branch (windows.ai.toolkit/neutron-server)'
  type: string
  default: 'dev/FoundryLocalCore/main'

variables:
- group: FoundryLocal-ESRP-Signing

resources:
  repositories:
  - repository: neutron-server
    type: git
    name: windows.ai.toolkit/neutron-server
    endpoint: AIFoundryLocal-WindowsAIToolkit-SC
    ref: refs/heads/${{ parameters.neutronServerBranch }}
  - repository: test-data-shared
    type: git
    name: windows.ai.toolkit/test-data-shared
    endpoint: AIFoundryLocal-WindowsAIToolkit-SC
    lfs: true
    ref: refs/heads/main
  - repository: 1ESPipelineTemplates
    type: git
    name: 1ESPipelineTemplates/1ESPipelineTemplates
    ref: refs/tags/release

extends:
  template: v1/1ES.Official.PipelineTemplate.yml@1ESPipelineTemplates
  parameters:
    settings:
      networkIsolationPolicy: Permissive
    pool:
      # default all windows jobs, individual jobs override
      name: onnxruntime-Win-CPU-2022
      os: windows
    sdl:
      binskim:
        break: false
        scanOutputDirectoryOnly: true
      sourceRepositoriesToScan:
        include:
        - repository: neutron-server
        - repository: test-data-shared
    stages:
    # ── Compute Version ──
    # A single version string is computed once and shared across all stages.
    # This prevents timestamp drift between standard and WinML builds.
    # Outputs three format variants:
    #   sdkVersion  – semver for JS, C#, Rust (e.g. 1.0.0-dev.202604061234)
    #   pyVersion   – PEP 440 for Python     (e.g. 1.0.0.dev202604061234)
    #   flcVersion  – NuGet/FLC style         (e.g. 1.0.0-dev-202604061234-ab12cd34)
    - stage: compute_version
      displayName: 'Compute Version'
      dependsOn: []
      jobs:
      - job: version
        displayName: 'Compute Version'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Build.ArtifactStagingDirectory)/version-info'
        steps:
        - checkout: none
        - task: PowerShell@2
          displayName: 'Compute and write version files'
          inputs:
            targetType: inline
            script: |
              $base = "${{ parameters.version }}"
              $preId = "${{ parameters.prereleaseId }}"
              $ts = Get-Date -Format "yyyyMMddHHmm"
              $commitId = "$(Build.SourceVersion)".Substring(0, 8)

              if ($preId -ne '' -and $preId -ne 'none') {
                $sdkVersion = "$base-$preId"
                $pyVersion  = "$base$preId"
                $flcVersion = "$base-$preId"
              } elseif ("${{ parameters.isRelease }}" -ne "True") {
                $sdkVersion = "$base-dev.$ts"
                $pyVersion  = "$base.dev$ts"
                $flcVersion = "$base-dev-$ts-$commitId"
              } else {
                $sdkVersion = $base
                $pyVersion  = $base
                $flcVersion = $base
              }

              $outDir = "$(Build.ArtifactStagingDirectory)/version-info"
              New-Item -ItemType Directory -Path $outDir -Force | Out-Null
              Set-Content -Path "$outDir/sdkVersion.txt" -Value $sdkVersion -NoNewline
              Set-Content -Path "$outDir/pyVersion.txt"  -Value $pyVersion  -NoNewline
              Set-Content -Path "$outDir/flcVersion.txt" -Value $flcVersion -NoNewline

              Write-Host "SDK version: $sdkVersion"
              Write-Host "Python version: $pyVersion"
              Write-Host "FLC version: $flcVersion"

    # ── Build FLC ──
    - stage: build_core
      displayName: 'Build Core'
      dependsOn: compute_version
      jobs:
      - job: flc_win_x64
        displayName: 'win-x64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-win-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - checkout: neutron-server
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: win-x64
            platform: x64

      - job: flc_win_arm64
        displayName: 'win-arm64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-win-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - checkout: neutron-server
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: win-arm64
            platform: arm64

      - job: flc_linux_x64
        displayName: 'linux-x64'
        pool:
          name: onnxruntime-Ubuntu2404-AMD-CPU
          os: linux
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-linux-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - checkout: neutron-server
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: linux-x64
            platform: x64

      - job: flc_osx_arm64
        displayName: 'osx-arm64'
        pool:
          name: AcesShared
          os: macOS
          demands:
          - ImageOverride -equals ACES_VM_SharedPool_Sequoia
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-osx-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/native'
        steps:
        - checkout: neutron-server
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/build-core-steps.yml@self
          parameters:
            flavor: osx-arm64
            platform: arm64

      - job: package_flc
        displayName: 'Package Core'
        dependsOn:
        - flc_win_x64
        - flc_win_arm64
        - flc_linux_x64
        - flc_osx_arm64
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          outputs:
          - output: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Build.ArtifactStagingDirectory)/flc-nuget'
          - output: pipelineArtifact
            artifactName: 'flc-wheels'
            targetPath: '$(Build.ArtifactStagingDirectory)/flc-wheels'
          - output: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Build.ArtifactStagingDirectory)/deps-versions'
        steps:
        - checkout: neutron-server
          clean: true
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-win-x64'
            targetPath: '$(Pipeline.Workspace)/flc-win-x64'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-win-arm64'
            targetPath: '$(Pipeline.Workspace)/flc-win-arm64'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-linux-x64'
            targetPath: '$(Pipeline.Workspace)/flc-linux-x64'
        - task: DownloadPipelineArtifact@2
          inputs:
            buildType: current
            artifactName: 'flc-osx-arm64'
            targetPath: '$(Pipeline.Workspace)/flc-osx-arm64'
        - task: PowerShell@2
          displayName: 'List downloaded platform artifacts'
          inputs:
            targetType: inline
            script: |
              foreach ($name in @('flc-win-x64','flc-win-arm64','flc-linux-x64','flc-osx-arm64')) {
                $dir = "$(Pipeline.Workspace)/$name"
                Write-Host "Contents of ${dir}:"
                if (Test-Path $dir) { Get-ChildItem $dir -Recurse | ForEach-Object { Write-Host $_.FullName } }
                else { Write-Host "  (directory not found)" }
              }
        - template: .pipelines/templates/package-core-steps.yml@self
          parameters:
            version: ${{ parameters.version }}
            isRelease: ${{ parameters.isRelease }}
            prereleaseId: ${{ parameters.prereleaseId }}
            isWinML: false
            platforms:
            - name: win-x64
              artifactName: flc-win-x64
            - name: win-arm64
              artifactName: flc-win-arm64
            - name: linux-x64
              artifactName: flc-linux-x64
            - name: osx-arm64
              artifactName: flc-osx-arm64

    # ── Build C# SDK ──
    - stage: build_cs
      displayName: 'Build C# SDK'
      dependsOn:
      - build_core
      jobs:
      - job: cs_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'cs-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/cs-sdk'
        steps:
        - checkout: self
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/build-cs-steps.yml@self
          parameters:
            version: ${{ parameters.version }}
            isRelease: ${{ parameters.isRelease }}
            prereleaseId: ${{ parameters.prereleaseId }}
            isWinML: false
            flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

    # ── Build JS Node-API Addon (all platforms) ──
    - stage: build_js_addon
      displayName: 'Build JS Addon'
      dependsOn: []
      jobs:
      - job: js_addon_win_x64
        displayName: 'Addon win32-x64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-win32-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
          clean: true
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/win32-x64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

      - job: js_addon_win_arm64
        displayName: 'Addon win32-arm64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-win32-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
          clean: true
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
            targetArch: arm64
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/win32-arm64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

      - job: js_addon_linux_x64
        displayName: 'Addon linux-x64'
        pool:
          name: onnxruntime-Ubuntu2404-AMD-CPU
          os: linux
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-linux-x64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
          clean: true
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/linux-x64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

      - job: js_addon_osx_arm64
        displayName: 'Addon osx-arm64'
        pool:
          name: Azure Pipelines
          vmImage: 'macOS-15'
          os: macOS
        templateContext:
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-addon-darwin-arm64'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
        steps:
        - checkout: self
          clean: true
        - template: .pipelines/templates/build-js-addon-steps.yml@self
          parameters:
            repoRoot: $(Build.SourcesDirectory)
            targetArch: arm64
        - task: PowerShell@2
          displayName: 'Stage addon artifact'
          inputs:
            targetType: inline
            script: |
              $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
              New-Item -ItemType Directory -Path $destDir -Force | Out-Null
              Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/darwin-arm64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

    # ── Build JS SDK ──
    - stage: build_js
      displayName: 'Build JS SDK'
      dependsOn:
      - build_core
      - build_js_addon
      jobs:
      - job: js_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'js-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/js-sdk'
        steps:
        - checkout: self
          clean: true
        - checkout: test-data-shared
          lfs: true

        # Download prebuilt Node-API addons for all platforms
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (win32-x64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-win32-x64'
            targetPath: '$(Pipeline.Workspace)/js-addon-win32-x64'
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (win32-arm64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-win32-arm64'
            targetPath: '$(Pipeline.Workspace)/js-addon-win32-arm64'
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (linux-x64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-linux-x64'
            targetPath: '$(Pipeline.Workspace)/js-addon-linux-x64'
        - task: DownloadPipelineArtifact@2
          displayName: 'Download addon (osx-arm64)'
          inputs:
            buildType: current
            artifactName: 'js-addon-darwin-arm64'
            targetPath: '$(Pipeline.Workspace)/js-addon-darwin-arm64'

        - task: PowerShell@2
          displayName: 'Place prebuilt addons'
          inputs:
            targetType: inline
            script: |
              $repoRoot = "$(Build.SourcesDirectory)/Foundry-Local"
              $prebuildsDir = "$repoRoot/sdk/js/prebuilds"
              foreach ($platform in @('win32-x64','win32-arm64','linux-x64','darwin-arm64')) {
                $src = "$(Pipeline.Workspace)/js-addon-$platform/foundry_local_napi.node"
                $destDir = "$prebuildsDir/$platform"
                New-Item -ItemType Directory -Path $destDir -Force | Out-Null
                Copy-Item $src "$destDir/foundry_local_napi.node" -Force
                Write-Host "Placed addon for $platform ($($(Get-Item $src).Length) bytes)"
              }

        - template: .pipelines/templates/build-js-steps.yml@self
          parameters:
            version: ${{ parameters.version }}
            isRelease: ${{ parameters.isRelease }}
            prereleaseId: ${{ parameters.prereleaseId }}
            isWinML: false
            flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

    # ── Build Python SDK ──
    - stage: build_python
      displayName: 'Build Python SDK'
      dependsOn:
      - build_core
      jobs:
      - job: python_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-wheels'
            targetPath: '$(Pipeline.Workspace)/flc-wheels'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'python-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/python-sdk'
        steps:
        - checkout: self
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/build-python-steps.yml@self
          parameters:
            version: ${{ parameters.version }}
            isRelease: ${{ parameters.isRelease }}
            prereleaseId: ${{ parameters.prereleaseId }}
            isWinML: false
            flcWheelsDir: '$(Pipeline.Workspace)/flc-wheels'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

    # ── Build Rust SDK ──
    - stage: build_rust
      displayName: 'Build Rust SDK'
      dependsOn:
      - build_core
      jobs:
      - job: rust_sdk
        displayName: 'Build'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'version-info'
            targetPath: '$(Pipeline.Workspace)/version-info'
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
          outputs:
          - output: pipelineArtifact
            artifactName: 'rust-sdk'
            targetPath: '$(Build.ArtifactStagingDirectory)/rust-sdk'
        steps:
        - checkout: self
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/build-rust-steps.yml@self
          parameters:
            version: ${{ parameters.version }}
            isRelease: ${{ parameters.isRelease }}
            prereleaseId: ${{ parameters.prereleaseId }}
            isWinML: false
            flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

    # Rust SDK has one package with different install options for standard vs WinML, 
    # so we only publish once under the standard stage and skip the WinML stage. Leaving 
    # it as a commented block incase we decide to publish separate Rust WinML package in the future.
    # # ── Build Rust SDK (WinML) ──
    # - stage: build_rust_winml
    #   displayName: 'Build Rust SDK (WinML)'
    #   dependsOn:
    #   - build_core_winml
    #   jobs:
    #   - job: rust_sdk_winml
    #     displayName: 'Build'
    #     pool:
    #       name: onnxruntime-Win-CPU-2022
    #       os: windows
    #     templateContext:
    #       inputs:
    #       - input: pipelineArtifact
    #         artifactName: 'version-info'
    #         targetPath: '$(Pipeline.Workspace)/version-info'
    #       - input: pipelineArtifact
    #         artifactName: 'flc-nuget-winml'
    #         targetPath: '$(Pipeline.Workspace)/flc-nuget-winml'
    #       - input: pipelineArtifact
    #         artifactName: 'deps-versions-winml'
    #         targetPath: '$(Pipeline.Workspace)/deps-versions-winml'
    #       outputs:
    #       - output: pipelineArtifact
    #         artifactName: 'rust-sdk-winml'
    #         targetPath: '$(Build.ArtifactStagingDirectory)/rust-sdk-winml'
    #     steps:
    #     - checkout: self
    #       clean: true
    #     - checkout: test-data-shared
    #       lfs: true
    #     - template: .pipelines/templates/build-rust-steps.yml@self
    #       parameters:
    #         version: ${{ parameters.version }}
    #         isRelease: ${{ parameters.isRelease }}
    #         prereleaseId: ${{ parameters.prereleaseId }}
    #         isWinML: true
    #         flcNugetDir: '$(Pipeline.Workspace)/flc-nuget-winml'
    #         depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-winml'
    #         outputDir: '$(Build.ArtifactStagingDirectory)/rust-sdk-winml'

    # ── Test C# SDK ──
    - stage: test_cs
      displayName: 'Test C#'
      dependsOn: build_cs
      jobs:
      - job: test_cs_win_x64
        displayName: 'win-x64'
        pool:
          name: onnxruntime-Win-CPU-2022
          os: windows
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
        steps:
        - checkout: self
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/test-cs-steps.yml@self
          parameters:
            isWinML: false
            flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

      - job: test_cs_linux_x64
        displayName: 'linux-x64'
        pool:
          name: onnxruntime-Ubuntu2404-AMD-CPU
          os: linux
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
        steps:
        - checkout: self
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/test-cs-steps.yml@self
          parameters:
            isWinML: false
            flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
            depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

      - job: test_cs_osx_arm64
        displayName: 'osx-arm64'
        pool:
          name: AcesShared
          os: macOS
          demands:
          - ImageOverride -equals ACES_VM_SharedPool_Sequoia
        templateContext:
          inputs:
          - input: pipelineArtifact
            artifactName: 'flc-nuget'
            targetPath: '$(Pipeline.Workspace)/flc-nuget'
          - input: pipelineArtifact
            artifactName: 'deps-versions-standard'
            targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
        steps:
        - checkout: self
          clean: true
        - checkout: test-data-shared
          lfs: true
        - template: .pipelines/templates/test-cs-steps.yml@self
          parameters:
