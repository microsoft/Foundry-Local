# sdk_v1 coordinator: emits the full legacy (sdk/) stage graph.
#
# Produces NuGet/wheel/JS artifacts for Foundry Local Core (FLC) plus the
# v1 C# / JS / Python / Rust SDKs in both base and WinML flavors.
#
# Assumes the caller has already emitted:
#   * a `compute_version` stage publishing the `version-info` pipeline
#     artifact (containing sdkVersion.v1.txt, pyVersion.v1.txt, flcVersion.v1.txt)
#   * any stage referenced by `gateDependsOn` (typically `detect_changes`)
#
# The entire subgraph is gated by a single artificial root stage (`v1_gate`)
# whose runtime condition is supplied via `gateCondition`. When v1_gate is
# skipped, every downstream v1 stage skips via ADO's default `succeeded()`
# cascade on dependsOn. See stages-sdk-v2.yml for the rationale behind this
# pattern.

parameters:
- name: version
  type: string
- name: prereleaseId
  type: string
  default: 'none'
- name: isRelease
  type: boolean
  default: false
- name: neutronServerBranch
  type: string
- name: gateCondition
  type: string
  default: 'succeeded()'
- name: gateDependsOn
  type: object
  default: []

stages:

# -- Artificial root: gates the entire v1 subgraph --
- stage: v1_gate
  displayName: 'sdk_v1 build gate'
  condition: ${{ parameters.gateCondition }}
  dependsOn: ${{ parameters.gateDependsOn }}
  jobs:
  - job: noop
    displayName: 'sdk_v1 build enabled'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    steps:
    - checkout: none
    - script: echo "sdk_v1 build enabled"
      displayName: 'sdk_v1 build enabled'

- stage: build_core
  displayName: 'Build Core'
  dependsOn:
  - v1_gate
  - compute_version
  jobs:
  - job: flc_win_x64
    displayName: 'win-x64'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'flc-win-x64'
        targetPath: '$(Build.ArtifactStagingDirectory)/native'
    steps:
    - template: checkout-steps.yml
      parameters:
        repoName: neutron-server
        ref: refs/heads/${{ parameters.neutronServerBranch }}
    - template: checkout-steps.yml
      parameters:
        repoName: test-data-shared
    - template: build-core-steps.yml
      parameters:
        flavor: win-x64
        platform: x64

  - job: flc_win_arm64
    displayName: 'win-arm64'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'flc-win-arm64'
        targetPath: '$(Build.ArtifactStagingDirectory)/native'
    steps:
    - template: checkout-steps.yml
      parameters:
        repoName: neutron-server
        ref: refs/heads/${{ parameters.neutronServerBranch }}
    - template: checkout-steps.yml
      parameters:
        repoName: test-data-shared
    - template: build-core-steps.yml
      parameters:
        flavor: win-arm64
        platform: arm64

  - job: flc_linux_x64
    displayName: 'linux-x64'
    pool:
      name: onnxruntime-Ubuntu2404-AMD-CPU
      os: linux
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'flc-linux-x64'
        targetPath: '$(Build.ArtifactStagingDirectory)/native'
    steps:
    - template: checkout-steps.yml
      parameters:
        repoName: neutron-server
        ref: refs/heads/${{ parameters.neutronServerBranch }}
    - template: checkout-steps.yml
      parameters:
        repoName: test-data-shared
    - template: build-core-steps.yml
      parameters:
        flavor: linux-x64
        platform: x64

  - job: flc_linux_arm64
    displayName: 'linux-arm64'
    pool:
      name: onnxruntime-linux-ARM64-CPU-2019
      os: linux
      hostArchitecture: arm64
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'flc-linux-arm64'
        targetPath: '$(Build.ArtifactStagingDirectory)/native'
    steps:
    - template: checkout-steps.yml
      parameters:
        repoName: neutron-server
        ref: refs/heads/${{ parameters.neutronServerBranch }}
    - template: checkout-steps.yml
      parameters:
        repoName: test-data-shared
    - template: build-core-steps.yml
      parameters:
        flavor: linux-arm64
        platform: arm64

  - job: flc_osx_arm64
    displayName: 'osx-arm64'
    pool:
      name: AcesShared
      os: macOS
      demands:
      - ImageOverride -equals ACES_VM_SharedPool_Sequoia
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'flc-osx-arm64'
        targetPath: '$(Build.ArtifactStagingDirectory)/native'
    steps:
    - template: checkout-steps.yml
      parameters:
        repoName: neutron-server
        ref: refs/heads/${{ parameters.neutronServerBranch }}
    - template: checkout-steps.yml
      parameters:
        repoName: test-data-shared
    # AcesShared macOS agents don't have git-lfs pre-installed
    - script: brew install git-lfs && git lfs install
      displayName: 'Install Git LFS'
    - template: build-core-steps.yml
      parameters:
        flavor: osx-arm64
        platform: arm64

  - job: package_flc
    displayName: 'Package Core'
    dependsOn:
    - flc_win_x64
    - flc_win_arm64
    - flc_linux_x64
    - flc_linux_arm64
    - flc_osx_arm64
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'version-info'
        targetPath: '$(Pipeline.Workspace)/version-info'
      outputs:
      - output: pipelineArtifact
        artifactName: 'flc-nuget'
        targetPath: '$(Build.ArtifactStagingDirectory)/flc-nuget'
      - output: pipelineArtifact
        artifactName: 'flc-wheels'
        targetPath: '$(Build.ArtifactStagingDirectory)/flc-wheels'
      - output: pipelineArtifact
        artifactName: 'deps-versions-standard'
        targetPath: '$(Build.ArtifactStagingDirectory)/deps-versions'
    steps:
    - template: checkout-steps.yml
      parameters:
        repoName: neutron-server
        ref: refs/heads/${{ parameters.neutronServerBranch }}
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: current
        artifactName: 'flc-win-x64'
        targetPath: '$(Pipeline.Workspace)/flc-win-x64'
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: current
        artifactName: 'flc-win-arm64'
        targetPath: '$(Pipeline.Workspace)/flc-win-arm64'
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: current
        artifactName: 'flc-linux-x64'
        targetPath: '$(Pipeline.Workspace)/flc-linux-x64'
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: current
        artifactName: 'flc-linux-arm64'
        targetPath: '$(Pipeline.Workspace)/flc-linux-arm64'
    - task: DownloadPipelineArtifact@2
      inputs:
        buildType: current
        artifactName: 'flc-osx-arm64'
        targetPath: '$(Pipeline.Workspace)/flc-osx-arm64'
    - task: PowerShell@2
      displayName: 'List downloaded platform artifacts'
      inputs:
        targetType: inline
        script: |
          foreach ($name in @('flc-win-x64','flc-win-arm64','flc-linux-x64','flc-linux-arm64','flc-osx-arm64')) {
            $dir = "$(Pipeline.Workspace)/$name"
            Write-Host "Contents of ${dir}:"
            if (Test-Path $dir) { Get-ChildItem $dir -Recurse | ForEach-Object { Write-Host $_.FullName } }
            else { Write-Host "  (directory not found)" }
          }
    - template: package-core-steps.yml
      parameters:
        version: ${{ parameters.version }}
        isRelease: ${{ parameters.isRelease }}
        prereleaseId: ${{ parameters.prereleaseId }}
        isWinML: false
        platforms:
        - name: win-x64
          artifactName: flc-win-x64
        - name: win-arm64
          artifactName: flc-win-arm64
        - name: linux-x64
          artifactName: flc-linux-x64
        - name: linux-arm64
          artifactName: flc-linux-arm64
        - name: osx-arm64
          artifactName: flc-osx-arm64

# ── Build C# SDK ──
- stage: build_cs
  displayName: 'Build C# SDK'
  dependsOn:
  - v1_gate
  - build_core
  jobs:
  - job: cs_sdk
    displayName: 'Build'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'version-info'
        targetPath: '$(Pipeline.Workspace)/version-info'
      - input: pipelineArtifact
        artifactName: 'flc-nuget'
        targetPath: '$(Pipeline.Workspace)/flc-nuget'
      - input: pipelineArtifact
        artifactName: 'deps-versions-standard'
        targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
      outputs:
      - output: pipelineArtifact
        artifactName: 'cs-sdk'
        targetPath: '$(Build.ArtifactStagingDirectory)/cs-sdk'
    steps:
    - checkout: self
    - template: checkout-steps.yml
      parameters:
        repoName: test-data-shared
    - template: build-cs-steps.yml
      parameters:
        version: ${{ parameters.version }}
        isRelease: ${{ parameters.isRelease }}
        prereleaseId: ${{ parameters.prereleaseId }}
        isWinML: false
        flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
        depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

# ── Build JS Node-API Addon (all platforms) ──
- stage: build_js_addon
  displayName: 'Build JS Addon'
  dependsOn: [v1_gate]
  jobs:
  - job: js_addon_win_x64
    displayName: 'Addon win32-x64'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'js-addon-win32-x64'
        targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
    steps:
    - checkout: self
    - template: build-js-addon-steps.yml
      parameters:
        repoRoot: $(Build.SourcesDirectory)
    - task: PowerShell@2
      displayName: 'Stage addon artifact'
      inputs:
        targetType: inline
        script: |
          $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/win32-x64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

  - job: js_addon_win_arm64
    displayName: 'Addon win32-arm64'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'js-addon-win32-arm64'
        targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
    steps:
    - checkout: self
    - template: build-js-addon-steps.yml
      parameters:
        repoRoot: $(Build.SourcesDirectory)
        targetArch: arm64
    - task: PowerShell@2
      displayName: 'Stage addon artifact'
      inputs:
        targetType: inline
        script: |
          $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/win32-arm64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

  - job: js_addon_linux_x64
    displayName: 'Addon linux-x64'
    pool:
      name: onnxruntime-Ubuntu2404-AMD-CPU
      os: linux
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'js-addon-linux-x64'
        targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
    steps:
    - checkout: self
    - template: build-js-addon-steps.yml
      parameters:
        repoRoot: $(Build.SourcesDirectory)
    - task: PowerShell@2
      displayName: 'Stage addon artifact'
      inputs:
        targetType: inline
        script: |
          $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/linux-x64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

  - job: js_addon_linux_arm64
    displayName: 'Addon linux-arm64'
    pool:
      name: onnxruntime-linux-ARM64-CPU-2019
      os: linux
      hostArchitecture: arm64
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'js-addon-linux-arm64'
        targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
    steps:
    - checkout: self
    - template: build-js-addon-steps.yml
      parameters:
        repoRoot: $(Build.SourcesDirectory)
    - task: PowerShell@2
      displayName: 'Stage addon artifact'
      inputs:
        targetType: inline
        script: |
          $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/linux-arm64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

  - job: js_addon_osx_arm64
    displayName: 'Addon osx-arm64'
    pool:
      name: Azure Pipelines
      vmImage: 'macOS-15'
      os: macOS
    templateContext:
      outputs:
      - output: pipelineArtifact
        artifactName: 'js-addon-darwin-arm64'
        targetPath: '$(Build.ArtifactStagingDirectory)/js-addon'
    steps:
    - checkout: self
    - template: build-js-addon-steps.yml
      parameters:
        repoRoot: $(Build.SourcesDirectory)
        targetArch: arm64
    - task: PowerShell@2
      displayName: 'Stage addon artifact'
      inputs:
        targetType: inline
        script: |
          $destDir = "$(Build.ArtifactStagingDirectory)/js-addon"
          New-Item -ItemType Directory -Path $destDir -Force | Out-Null
          Copy-Item "$(Build.SourcesDirectory)/sdk/js/prebuilds/darwin-arm64/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force

# ── Build JS SDK ──
- stage: build_js
  displayName: 'Build JS SDK'
  dependsOn:
  - v1_gate
  - build_core
  - build_js_addon
  jobs:
  - job: js_sdk
    displayName: 'Build'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'version-info'
        targetPath: '$(Pipeline.Workspace)/version-info'
      - input: pipelineArtifact
        artifactName: 'flc-nuget'
        targetPath: '$(Pipeline.Workspace)/flc-nuget'
      - input: pipelineArtifact
        artifactName: 'deps-versions-standard'
        targetPath: '$(Pipeline.Workspace)/deps-versions-standard'
      outputs:
      - output: pipelineArtifact
        artifactName: 'js-sdk'
        targetPath: '$(Build.ArtifactStagingDirectory)/js-sdk'
    steps:
    - checkout: self
    - template: checkout-steps.yml
      parameters:
        repoName: test-data-shared

    # Download prebuilt Node-API addons for all platforms
    - task: DownloadPipelineArtifact@2
      displayName: 'Download addon (win32-x64)'
      inputs:
        buildType: current
        artifactName: 'js-addon-win32-x64'
        targetPath: '$(Pipeline.Workspace)/js-addon-win32-x64'
    - task: DownloadPipelineArtifact@2
      displayName: 'Download addon (win32-arm64)'
      inputs:
        buildType: current
        artifactName: 'js-addon-win32-arm64'
        targetPath: '$(Pipeline.Workspace)/js-addon-win32-arm64'
    - task: DownloadPipelineArtifact@2
      displayName: 'Download addon (linux-x64)'
      inputs:
        buildType: current
        artifactName: 'js-addon-linux-x64'
        targetPath: '$(Pipeline.Workspace)/js-addon-linux-x64'
    - task: DownloadPipelineArtifact@2
      displayName: 'Download addon (linux-arm64)'
      inputs:
        buildType: current
        artifactName: 'js-addon-linux-arm64'
        targetPath: '$(Pipeline.Workspace)/js-addon-linux-arm64'
    - task: DownloadPipelineArtifact@2
      displayName: 'Download addon (osx-arm64)'
      inputs:
        buildType: current
        artifactName: 'js-addon-darwin-arm64'
        targetPath: '$(Pipeline.Workspace)/js-addon-darwin-arm64'

    - task: PowerShell@2
      displayName: 'Place prebuilt addons'
      inputs:
        targetType: inline
        script: |
          $multiCheckout = "$(Build.SourcesDirectory)/Foundry-Local"
          if (Test-Path $multiCheckout) { $repoRoot = $multiCheckout } else { $repoRoot = "$(Build.SourcesDirectory)" }
          $prebuildsDir = "$repoRoot/sdk/js/prebuilds"
          foreach ($platform in @('win32-x64','win32-arm64','linux-x64','linux-arm64','darwin-arm64')) {
            $src = "$(Pipeline.Workspace)/js-addon-$platform/foundry_local_napi.node"
            $destDir = "$prebuildsDir/$platform"
            New-Item -ItemType Directory -Path $destDir -Force | Out-Null
            Copy-Item $src "$destDir/foundry_local_napi.node" -Force
            Write-Host "Placed addon for $platform ($($(Get-Item $src).Length) bytes)"
          }

    - template: build-js-steps.yml
      parameters:
        version: ${{ parameters.version }}
        isRelease: ${{ parameters.isRelease }}
        prereleaseId: ${{ parameters.prereleaseId }}
        isWinML: false
        flcNugetDir: '$(Pipeline.Workspace)/flc-nuget'
        depsVersionsDir: '$(Pipeline.Workspace)/deps-versions-standard'

