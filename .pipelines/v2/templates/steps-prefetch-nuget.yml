# Pre-download ORT / GenAI / (optionally) WinML NuGet packages from the
# aiinfra ADO feed and emit cmake_extra_defines pointing at them.
#
# Sets the pipeline variable `cmakeFetchDefines` containing the space-separated
# `KEY=PATH` pairs to pass to build.py --cmake_extra_defines.
#
# Parameters:
#   ortVersion     – Microsoft.ML.OnnxRuntime.Foundry version
#   genaiVersion   – Microsoft.ML.OnnxRuntimeGenAI.Foundry version
#   winmlVersion   – Microsoft.Windows.AI.MachineLearning version (Windows only)
#   includeWinml   – Download WinML and emit WINML_EP_CATALOG_FETCH_URL
#   includeOrtGpuLinux – Also download Microsoft.ML.OnnxRuntime.Gpu.Linux (Linux only)
#   shell          – 'pwsh' (Windows/macOS) or 'bash' (Linux)

parameters:
- name: ortVersion
  type: string
- name: genaiVersion
  type: string
- name: winmlVersion
  type: string
  default: ''
- name: includeWinml
  type: boolean
  default: false
- name: includeOrtGpuLinux
  type: boolean
  default: false
- name: shell
  type: string
  values: ['pwsh', 'bash']

steps:

- task: NuGetToolInstaller@1
  displayName: 'Install NuGet'

# Fail fast if the pipeline-pinned versions drift from the cmake source of
# truth in sdk_v2/deps_versions.json.
- task: PowerShell@2
  displayName: 'Validate pinned versions match deps_versions.json'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = 'Stop'
      $depsFile = Join-Path "$(Pipeline.Workspace)/s/Foundry-Local" "sdk_v2/deps_versions.json"
      if (-not (Test-Path $depsFile)) {
        throw "deps_versions.json not found at $depsFile"
      }

      Write-Host "Using deps_versions.json at: $depsFile"
      $deps = Get-Content $depsFile -Raw | ConvertFrom-Json
      $expected = @{
        'onnxruntime'                = '${{ parameters.ortVersion }}'
        'onnxruntime-genai'          = '${{ parameters.genaiVersion }}'
      }
      if ('${{ parameters.winmlVersion }}' -ne '') {
        $expected['windows-ai-machinelearning'] = '${{ parameters.winmlVersion }}'
      }
      $errors = @()
      foreach ($key in $expected.Keys) {
        $actual = $deps.$key.version
        if ($actual -ne $expected[$key]) {
          $errors += "  $key`: pipeline says '$($expected[$key])', deps_versions.json says '$actual'"
        }
      }
      if ($errors.Count -gt 0) {
        Write-Host "Version drift detected between pipeline literals and sdk_v2/deps_versions.json:"
        $errors | ForEach-Object { Write-Host $_ }
        throw "Bump the matching cpp*Version variable in .pipelines/v2/foundry-local-packaging.yml"
      }
      Write-Host "Pinned versions agree with sdk_v2/deps_versions.json."

- ${{ if eq(parameters.shell, 'pwsh') }}:
  - task: NuGetAuthenticate@1
    displayName: 'Authenticate NuGet feeds'

  - task: PowerShell@2
    displayName: 'Pre-download NuGet packages'
    inputs:
      targetType: inline
      pwsh: true
      script: |
        $ErrorActionPreference = 'Stop'
        $cacheDir = "$(Build.BinariesDirectory)/nuget_packages"
        New-Item -ItemType Directory -Force -Path $cacheDir | Out-Null

        $nugetCmd = Get-Command nuget -ErrorAction SilentlyContinue
        if (-not $nugetCmd) {
          throw "nuget CLI not found on PATH. This step uses nuget install to fetch package artifacts."
        }

        function Install-NuGetPackage {
          param(
            [string]$Id,
            [string]$Version,
            [string]$OutDir
          )

          $pkgDir = Join-Path $OutDir $Id
          if (Test-Path $pkgDir) {
            Remove-Item -Recurse -Force $pkgDir
          }

          $nugetArgs = @(
            'install', $Id,
            '-Version', $Version,
            '-Source', 'https://pkgs.dev.azure.com/aiinfra/AIFoundryLocal/_packaging/AIFoundryLocal_PublicPackages/nuget/v3/index.json',
            '-OutputDirectory', $OutDir,
            '-ExcludeVersion',
            '-NonInteractive',
            '-DirectDownload',
            '-PackageSaveMode', 'nupkg'
          )

          Write-Host "Running: nuget $($nugetArgs -join ' ')"
          # nuget writes status lines to stdout; forward them to logs but keep
          # this function's output channel reserved for the return path.
          & nuget $nugetArgs | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) {
            throw "nuget install failed for $Id $Version"
          }

          $nupkg = Get-ChildItem -Path $pkgDir -Filter '*.nupkg' -File -Recurse -ErrorAction SilentlyContinue |
            Sort-Object LastWriteTime -Descending |
            Select-Object -First 1
          if (-not $nupkg) {
            throw "nuget install did not produce a .nupkg under $pkgDir"
          }

          $resolvedPath = $nupkg | Select-Object -ExpandProperty FullName -First 1
          if ([string]::IsNullOrWhiteSpace($resolvedPath)) {
            throw "nuget install produced an invalid path under $pkgDir"
          }

          return $resolvedPath
        }

        $packages = @(
          @{ key = 'genai'; id = 'Microsoft.ML.OnnxRuntimeGenAI.Foundry'; version = '${{ parameters.genaiVersion }}' },
          @{ key = 'ort';   id = 'Microsoft.ML.OnnxRuntime.Foundry';     version = '${{ parameters.ortVersion }}'   }
        )
        if ($${{ parameters.includeOrtGpuLinux }}) {
          $packages += @{ key = 'ort_gpu_linux'; id = 'Microsoft.ML.OnnxRuntime.Gpu.Linux'; version = '${{ parameters.ortVersion }}' }
        }

        $defines = @()
        foreach ($pkg in $packages) {
          Write-Host "Downloading $($pkg.id) $($pkg.version) via nuget install"
          $out = Install-NuGetPackage -Id $pkg.id -Version $pkg.version -OutDir $cacheDir
          if ([string]::IsNullOrWhiteSpace($out)) { throw "$($pkg.key) download failed" }
          $downloaded = Get-Item -LiteralPath $out -ErrorAction Stop
          Write-Host "  -> $($downloaded.FullName) ($($downloaded.Length) bytes)"

          switch ($pkg.key) {
            'genai'         { $defines += "GENAI_FETCH_URL=$($downloaded.FullName)" }
            'ort'           { $defines += "ORT_FETCH_URL=$($downloaded.FullName)" }
            'ort_gpu_linux' { $defines += "ORT_GPU_LINUX_FETCH_URL=$($downloaded.FullName)" }
          }
        }

        if ($${{ parameters.includeWinml }}) {
          # WinML 2.x (Microsoft.Windows.AI.MachineLearning) is reg-free — a single self-contained
          # native package with no transitive Windows App SDK Foundation dependency to resolve.
          Write-Host "Downloading Microsoft.Windows.AI.MachineLearning ${{ parameters.winmlVersion }} via nuget install"
          $winmlOut = Install-NuGetPackage -Id 'Microsoft.Windows.AI.MachineLearning' -Version '${{ parameters.winmlVersion }}' -OutDir $cacheDir
          if ([string]::IsNullOrWhiteSpace($winmlOut)) { throw "WinML download failed" }
          $winmlDownloaded = Get-Item -LiteralPath $winmlOut -ErrorAction Stop
          Write-Host "  -> $($winmlDownloaded.FullName) ($($winmlDownloaded.Length) bytes)"
          $defines += "WINML_EP_CATALOG_FETCH_URL=$($winmlDownloaded.FullName)"
        }

        $joined = ($defines | ForEach-Object { "`"$_`"" }) -join ' '
        Write-Host "##vso[task.setvariable variable=cmakeFetchDefines]$joined"
        Write-Host "cmakeFetchDefines = $joined"

- ${{ if eq(parameters.shell, 'bash') }}:
  - task: NuGetAuthenticate@1
    displayName: 'Authenticate NuGet feeds'

  - bash: |
      set -euo pipefail
      cacheDir="$(Build.BinariesDirectory)/nuget_packages"
      mkdir -p "$cacheDir"

      # Use the AIFoundryLocal feed (with upstream to nuget.org) so restricted
      # build agents do not need direct connectivity to www.nuget.org.
      feed="https://pkgs.dev.azure.com/aiinfra/AIFoundryLocal/_packaging/AIFoundryLocal_PublicPackages/nuget/v2/package"

      declare -a entries=(
        "genai:Microsoft.ML.OnnxRuntimeGenAI.Foundry:${{ parameters.genaiVersion }}"
        "ort:Microsoft.ML.OnnxRuntime.Foundry:${{ parameters.ortVersion }}"
      )
      if [ "${{ parameters.includeWinml }}" = "True" ]; then
        # WinML is Windows-only; the bash branch should never receive includeWinml=true.
        echo "ERROR: includeWinml=true is not supported on the bash prefetch branch (WinML is Windows-only)." >&2
        exit 1
      fi
      if [ "${{ parameters.includeOrtGpuLinux }}" = "True" ]; then
        entries+=("ort_gpu_linux:Microsoft.ML.OnnxRuntime.Gpu.Linux:${{ parameters.ortVersion }}")
      fi

      defines=()
      for entry in "${entries[@]}"; do
        IFS=: read -r key id version <<< "$entry"
        out="$cacheDir/${key}.nupkg"
        url="$feed/${id}/${version}"
        echo "Downloading $id $version"
        curl -fSL -o "$out" "$url"
        echo "  -> $out ($(stat -c%s "$out" 2>/dev/null || stat -f%z "$out") bytes)"

        case "$key" in
          genai)         defines+=("\"GENAI_FETCH_URL=$out\"") ;;
          ort)           defines+=("\"ORT_FETCH_URL=$out\"") ;;
          ort_gpu_linux) defines+=("\"ORT_GPU_LINUX_FETCH_URL=$out\"") ;;
        esac
      done

      joined="${defines[*]}"
      echo "##vso[task.setvariable variable=cmakeFetchDefines]$joined"
      echo "cmakeFetchDefines = $joined"
    displayName: 'Pre-download NuGet packages'


