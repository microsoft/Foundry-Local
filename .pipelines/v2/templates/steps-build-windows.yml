# Reusable Windows build steps for the Foundry Local C++ SDK.
#
# Bootstraps vcpkg, pre-downloads ORT/GenAI/WinML packages, then configures,
# builds, optionally tests, and stages artifacts for the parent stage's
# templateContext.outputs.
#
# Parameters:
#   arch           – 'x64' or 'arm64' (arm64 is cross-compiled, no tests)
#   buildConfig    – CMake config (Debug, Release, RelWithDebInfo, MinSizeRel)
#   ortVersion     – Microsoft.ML.OnnxRuntime.Foundry version
#   genaiVersion   – Microsoft.ML.OnnxRuntimeGenAI.Foundry version
#   winmlVersion   – Microsoft.Windows.AI.MachineLearning version
#   runTests       – Whether to run tests
#   stageHeaders   – Whether to stage public headers as a separate artifact

parameters:
- name: arch
  type: string
  values: ['x64', 'arm64']
- name: buildConfig
  type: string
- name: ortVersion
  type: string
- name: genaiVersion
  type: string
- name: winmlVersion
  type: string
- name: runTests
  type: boolean
  default: false
- name: stageHeaders
  type: boolean
  default: false

steps:

# Windows hosted agents don't have python on PATH by default — the launcher
# stub redirects to the Microsoft Store. UsePythonVersion installs and adds it
# to PATH for the rest of the job. arm64 builds cross-compile on the x64
# Windows host, so x64 Python is correct for both archs.
- task: UsePythonVersion@0
  displayName: 'Use Python 3.12'
  inputs:
    versionSpec: '3.12'
    architecture: 'x64'

- script: |
    git clone https://github.com/microsoft/vcpkg.git $(Build.BinariesDirectory)\vcpkg
    call $(Build.BinariesDirectory)\vcpkg\bootstrap-vcpkg.bat -disableMetrics
    mkdir $(Build.BinariesDirectory)\tools
    echo @exit /b 0 > $(Build.BinariesDirectory)\tools\pkg-config.bat
  displayName: 'Bootstrap vcpkg'

- template: steps-prefetch-nuget.yml
  parameters:
    ortVersion: ${{ parameters.ortVersion }}
    genaiVersion: ${{ parameters.genaiVersion }}
    winmlVersion: ${{ parameters.winmlVersion }}
    includeWinml: true
    shell: pwsh

# Bake the pipeline-computed version into the binary so FoundryLocalGetVersionString()
# matches the .nupkg version (e.g. 0.1.0-dev.202605111234) instead of the cmake default.
- task: PowerShell@2
  displayName: 'Append version define'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $version = (Get-Content "$(Pipeline.Workspace)/version-info/sdkVersion.txt" -Raw).Trim()
      $defines = '$(cmakeFetchDefines)' + " `"FOUNDRY_LOCAL_VERSION_STRING=$version`""
      Write-Host "##vso[task.setvariable variable=cmakeFetchDefines]$defines"
      Write-Host "cmakeFetchDefines = $defines"

# Tests need shared model files.
- ${{ if eq(parameters.runTests, true) }}:
  - template: ../../templates/checkout-steps.yml@self
    parameters:
      repoName: test-data-shared
      basePath: '$(Agent.BuildDirectory)'

- ${{ if eq(parameters.arch, 'x64') }}:
  - script: >-
      python build.py
      --configure --build
      --config ${{ parameters.buildConfig }}
      --cmake_generator "Visual Studio 17 2022"
      --winml_sdk_version ${{ parameters.winmlVersion }}
      --cmake_extra_defines $(cmakeFetchDefines)
    displayName: 'Configure and build (x64)'
    workingDirectory: $(Build.SourcesDirectory)/sdk_v2/cpp
    env:
      VCPKG_ROOT: $(Build.BinariesDirectory)\vcpkg
      PKG_CONFIG: $(Build.BinariesDirectory)\tools\pkg-config.bat

- ${{ if eq(parameters.arch, 'arm64') }}:
  - script: >-
      python build.py
      --configure --build --arm64
      --config ${{ parameters.buildConfig }}
      --cmake_generator "Visual Studio 17 2022"
      --winml_sdk_version ${{ parameters.winmlVersion }}
      --cmake_extra_defines $(cmakeFetchDefines)
    displayName: 'Configure and build (arm64 cross-compile)'
    workingDirectory: $(Build.SourcesDirectory)/sdk_v2/cpp
    env:
      VCPKG_ROOT: $(Build.BinariesDirectory)\vcpkg
      PKG_CONFIG: $(Build.BinariesDirectory)\tools\pkg-config.bat

- ${{ if and(eq(parameters.runTests, true), eq(parameters.arch, 'x64')) }}:
  - script: python build.py --test --config ${{ parameters.buildConfig }}
    displayName: 'Run tests'
    workingDirectory: $(Build.SourcesDirectory)/sdk_v2/cpp
    env:
      VCPKG_ROOT: $(Build.BinariesDirectory)\vcpkg
      FOUNDRY_TEST_DATA_DIR: $(Agent.BuildDirectory)\test-data-shared

# Stage the redistributable native artifacts.
#   - Standard build: vcpkg statically links ORT/GenAI/azure-*/spdlog/fmt/
#     libcurl/libssl/zlib/brotli* into foundry_local.dll (see
#     sdk_v2/cpp/triplets/x64-windows.cmake), so the only runtime payload is
#     foundry_local.dll itself.
#   - WinML build: foundry_local.dll picks up one extra runtime dependency,
#     Microsoft.Windows.AI.MachineLearning.dll, which must travel with the wheel.
#     The WinML DLL is delay-loaded (see /DELAYLOAD in CMakeLists.txt) so it is
#     NOT needed at foundry_local.dll load time, but the cmake post-build copy
#     stages it next to foundry_local.dll for runtime EP discovery. ORT/GenAI
#     come from the onnxruntime-core / onnxruntime-genai-core pip deps.
- task: PowerShell@2
  displayName: 'Stage native artifacts'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $binDir = '$(Build.SourcesDirectory)/sdk_v2/cpp/build/Windows/${{ parameters.buildConfig }}/bin/${{ parameters.buildConfig }}'
      $linkDir = '$(Build.SourcesDirectory)/sdk_v2/cpp/build/Windows/${{ parameters.buildConfig }}/${{ parameters.buildConfig }}'
      $dst = '$(Build.ArtifactStagingDirectory)/native'
      New-Item -ItemType Directory -Force -Path $dst | Out-Null

      $sources = @(
        (Join-Path $binDir  'foundry_local.dll'),
        (Join-Path $binDir  'foundry_local.pdb'),
        (Join-Path $linkDir 'foundry_local.lib'),
        (Join-Path $binDir  'Microsoft.Windows.AI.MachineLearning.dll')
      )

      foreach ($s in $sources) {
        if (-not (Test-Path $s)) {
          Write-Error "Required artifact not found: $s"
          exit 1
        }
        Copy-Item -Path $s -Destination $dst -Force
        Write-Host "  staged $(Split-Path -Leaf $s)"
      }

- ${{ if eq(parameters.stageHeaders, true) }}:
  - task: CopyFiles@2
    displayName: 'Stage public headers'
    inputs:
      SourceFolder: '$(Build.SourcesDirectory)/sdk_v2/cpp/include'
      Contents: '**'
      TargetFolder: '$(Build.ArtifactStagingDirectory)/include'

  # Bundle the ms-gsl headers from vcpkg into cpp-native-include so the
  # artifact is a self-contained C++ consumption payload. foundry_local_cpp.h
  # transitively includes <gsl/span> (the public C++ wrapper API targets
  # C++17, so it uses gsl::span instead of std::span). ms-gsl is header-only
  # and identical across triplets, so sourcing once from x64-windows is
  # sufficient for every downstream consumer regardless of platform/arch.
  - task: CopyFiles@2
    displayName: 'Stage ms-gsl headers'
    inputs:
      SourceFolder: '$(Build.SourcesDirectory)/sdk_v2/cpp/build/Windows/${{ parameters.buildConfig }}/vcpkg_installed/x64-windows/include/gsl'
      Contents: '**'
      TargetFolder: '$(Build.ArtifactStagingDirectory)/include/gsl'
