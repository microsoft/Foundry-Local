# Native build + pack stages for the Foundry Local C++ SDK.
#
# Per-platform stages each produce a `cpp-native-<rid>` pipeline artifact. On
# Windows the build always includes the reg-free WinML 2.x runtime. A single
# pack stage assembles the artifacts into one NuGet package on every build
# (PR and main):
#
#   pack_nuget  – Microsoft.AI.Foundry.Local.Runtime
#                 (win-x64, win-arm64, linux-x64, osx-arm64; Windows ships WinML)

parameters:
- name: buildConfig
  type: string
- name: ortVersion
  type: string
- name: genaiVersion
  type: string
- name: winmlVersion
  type: string

stages:

  # ====================================================================
  # Windows x64 — build + test
  # ====================================================================
  - stage: cpp_build_win_x64
    displayName: 'C++ Native: Windows x64'
    dependsOn:
    - compute_version
    jobs:
    - job: build
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-win-x64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
        - output: pipelineArtifact
          artifactName: 'cpp-native-include'
          targetPath: '$(Build.ArtifactStagingDirectory)/include'
      steps:
      - template: steps-build-windows.yml
        parameters:
          arch: x64
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          winmlVersion: ${{ parameters.winmlVersion }}
          runTests: true
          stageHeaders: true

  # ====================================================================
  # Windows ARM64 — cross-compile only (no tests on x64 host)
  # ====================================================================
  - stage: cpp_build_win_arm64
    displayName: 'C++ Native: Windows ARM64'
    dependsOn:
    - compute_version
    jobs:
    - job: build
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-win-arm64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
      steps:
      - template: steps-build-windows.yml
        parameters:
          arch: arm64
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          winmlVersion: ${{ parameters.winmlVersion }}
          runTests: false
          stageHeaders: false

  # ====================================================================
  # Linux x64 — build + test
  # ====================================================================
  - stage: cpp_build_linux_x64
    displayName: 'C++ Native: Linux x64'
    dependsOn:
    - compute_version
    jobs:
    - job: build
      pool:
        name: onnxruntime-Ubuntu2404-AMD-CPU
        os: linux
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-linux-x64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
        - output: pipelineArtifact
          artifactName: 'cpp-native-symbols-linux-x64'
          targetPath: '$(Build.ArtifactStagingDirectory)/symbols'
      steps:
      - template: steps-build-linux.yml
        parameters:
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          runTests: true

  # ====================================================================
  # macOS ARM64 — build + test (native)
  # ====================================================================
  - stage: cpp_build_osx_arm64
    displayName: 'C++ Native: macOS ARM64'
    dependsOn:
    - compute_version
    jobs:
    - job: build
      pool:
        name: AcesShared
        os: macOS
        demands:
        - ImageOverride -equals ACES_VM_SharedPool_Sequoia
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-native-osx-arm64'
          targetPath: '$(Build.ArtifactStagingDirectory)/native'
        - output: pipelineArtifact
          artifactName: 'cpp-native-symbols-osx-arm64'
          targetPath: '$(Build.ArtifactStagingDirectory)/symbols'
      steps:
      - template: steps-build-macos.yml
        parameters:
          buildConfig: ${{ parameters.buildConfig }}
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
          runTests: true

  # ====================================================================
  # Pack — NuGet package (all 4 platforms; Windows includes WinML)
  # ====================================================================
  - stage: cpp_pack_nuget
    displayName: 'C++ Native: Pack NuGet'
    dependsOn:
    - compute_version
    - cpp_build_win_x64
    - cpp_build_win_arm64
    - cpp_build_linux_x64
    - cpp_build_osx_arm64
    jobs:
    - job: pack
      pool:
        name: onnxruntime-Win-CPU-2022
        os: windows
      templateContext:
        inputs:
        - input: pipelineArtifact
          artifactName: 'version-info'
          targetPath: '$(Pipeline.Workspace)/version-info'
        - input: pipelineArtifact
          artifactName: 'cpp-native-win-x64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-win-x64'
        - input: pipelineArtifact
          artifactName: 'cpp-native-win-arm64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-win-arm64'
        - input: pipelineArtifact
          artifactName: 'cpp-native-linux-x64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-linux-x64'
        - input: pipelineArtifact
          artifactName: 'cpp-native-osx-arm64'
          targetPath: '$(Pipeline.Workspace)/cpp-native-osx-arm64'
        outputs:
        - output: pipelineArtifact
          artifactName: 'cpp-nuget'
          targetPath: '$(Build.ArtifactStagingDirectory)/nuget'
      steps:
      - template: steps-pack-nuget.yml
        parameters:
          ortVersion: ${{ parameters.ortVersion }}
          genaiVersion: ${{ parameters.genaiVersion }}
