# Inner steps to restore, build, sign, and pack the sdk_v2 C# SDK
# (Microsoft.AI.Foundry.Local / Microsoft.AI.Foundry.Local.WinML).
#
# The caller is responsible for placing the Foundry Local Runtime nupkg
# (Microsoft.AI.Foundry.Local.Runtime[.WinML]) in `flNugetDir`, and for
# downloading the `version-info` pipeline artifact so this template can
# read $(Pipeline.Workspace)/version-info/sdkVersion.txt.

parameters:
- name: flNugetDir
  type: string
  displayName: 'Path to directory containing the Foundry Local Runtime .nupkg'
- name: isWinML
  type: boolean
  default: false
- name: outputDir
  type: string
  default: '$(Build.ArtifactStagingDirectory)/cs-sdk'
  displayName: 'Path to directory for the packed SDK nupkg'

steps:

- task: UseDotNet@2
  displayName: 'Use .NET 10 SDK'
  inputs:
    packageType: sdk
    version: '10.0.x'

# Read version from the version-info artifact produced by compute_version.
- task: PowerShell@2
  displayName: 'Set package version'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $v = (Get-Content "$(Pipeline.Workspace)/version-info/sdkVersion.txt" -Raw).Trim()
      Write-Host "Package version: $v"
      Write-Host "##vso[task.setvariable variable=packageVersion]$v"

# List downloaded Foundry Local Runtime artifact for debugging.
- task: PowerShell@2
  displayName: 'List downloaded Foundry Local Runtime artifact'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      Write-Host "Contents of ${{ parameters.flNugetDir }}:"
      Get-ChildItem "${{ parameters.flNugetDir }}" -Recurse | ForEach-Object { Write-Host $_.FullName }

# Create a temporary NuGet.config that includes the local Foundry Local
# Runtime feed. Locate the directory that actually contains the .nupkg so
# the local feed points at the right level (artifacts can be nested one
# directory deep when downloaded by templateContext).
- task: PowerShell@2
  displayName: 'Create NuGet.config with local Foundry Local Runtime feed'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $pkgPattern = 'Microsoft.AI.Foundry.Local.Runtime*.nupkg'
      $nupkg = Get-ChildItem "${{ parameters.flNugetDir }}" -Recurse -Filter $pkgPattern |
        Where-Object { $_.Name -notlike '*.snupkg' } | Select-Object -First 1
      if (-not $nupkg) { throw "No Microsoft.AI.Foundry.Local.Runtime*.nupkg found in ${{ parameters.flNugetDir }}" }
      $flFeedDir = $nupkg.DirectoryName
      Write-Host "Local Foundry Local Runtime feed directory: $flFeedDir"

      $nugetConfig = @"
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
          <add key="LocalFLRuntime" value="$flFeedDir" />
          <add key="AIFoundryLocal_PublicPackages" value="https://pkgs.dev.azure.com/aiinfra/AIFoundryLocal/_packaging/AIFoundryLocal_PublicPackages/nuget/v3/index.json" />
        </packageSources>
      </configuration>
      "@
      $configPath = "$(Build.ArtifactStagingDirectory)/NuGet.config"
      Set-Content -Path $configPath -Value $nugetConfig
      Write-Host "##vso[task.setvariable variable=customNugetConfig]$configPath"

- task: NuGetAuthenticate@1
  displayName: 'Authenticate NuGet feeds'

- task: PowerShell@2
  displayName: 'Restore SDK'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $proj = "$(Build.SourcesDirectory)/sdk_v2/cs/src/Microsoft.AI.Foundry.Local.csproj"
      if (-not (Test-Path $proj)) { throw "Project not found: $proj" }
      dotnet restore $proj `
        --configfile "$(customNugetConfig)" `
        /p:UseWinML=${{ parameters.isWinML }} `
        /p:FoundryLocalRuntimeVersion=$(packageVersion) `
        /p:FoundryLocalNativeBinDir=
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

- task: PowerShell@2
  displayName: 'Build SDK'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      dotnet build "$(Build.SourcesDirectory)/sdk_v2/cs/src/Microsoft.AI.Foundry.Local.csproj" `
        --no-restore --configuration Release `
        /p:UseWinML=${{ parameters.isWinML }} `
        /p:FoundryLocalRuntimeVersion=$(packageVersion) `
        /p:FoundryLocalNativeBinDir=
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

# Sign SDK DLLs across all target frameworks (net8.0, net9.0, netstandard2.0).
# Pattern is a recursive glob so every TFM output directory is covered.
- task: SFP.build-tasks.custom-build-task-1.EsrpCodeSigning@5
  displayName: 'Sign SDK DLLs'
  inputs:
    ConnectedServiceName: 'OnnxrunTimeCodeSign_20240611'
    UseMSIAuthentication: true
    AppRegistrationClientId: '$(esrpClientId)'
    AppRegistrationTenantId: '$(esrpTenantId)'
    EsrpClientId: '$(esrpClientId)'
    AuthAKVName: '$(esrpAkvName)'
    AuthSignCertName: '$(esrpSignCertName)'
    FolderPath: '$(Build.SourcesDirectory)/sdk_v2/cs/src/bin/Release'
    # Pattern is passed to .NET Directory.EnumerateFiles with SearchOption.AllDirectories,
    # so it must be a plain filename (no '/' or '**'). Recursion across TFM subfolders is
    # provided by the task itself when UseMinimatch=false.
    Pattern: 'Microsoft.AI.Foundry.Local.dll'
    SessionTimeout: 90
    ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2'
    MaxConcurrency: 25
    signConfigType: inlineSignParams
    inlineOperation: |
      [{"keyCode":"CP-230012","operationSetCode":"SigntoolSign","parameters":[{"parameterName":"OpusName","parameterValue":"Microsoft"},{"parameterName":"OpusInfo","parameterValue":"http://www.microsoft.com"},{"parameterName":"PageHash","parameterValue":"/NPH"},{"parameterName":"FileDigest","parameterValue":"/fd sha256"},{"parameterName":"TimeStamp","parameterValue":"/tr \"http://rfc3161.gtm.corp.microsoft.com/TSS/HttpTspServer\" /td sha256"}],"toolName":"signtool.exe","toolVersion":"6.2.9304.0"}]

# Pack NuGet.
- task: PowerShell@2
  displayName: 'Pack NuGet'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      dotnet pack "$(Build.SourcesDirectory)/sdk_v2/cs/src/Microsoft.AI.Foundry.Local.csproj" `
        --no-build --no-restore --configuration Release `
        --output "${{ parameters.outputDir }}" `
        /p:PackageVersion=$(packageVersion) `
        /p:UseWinML=${{ parameters.isWinML }} `
        /p:FoundryLocalRuntimeVersion=$(packageVersion) `
        /p:FoundryLocalNativeBinDir= `
        /p:IncludeSymbols=true `
        /p:SymbolPackageFormat=snupkg
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

# Sign the produced nupkg(s).
- task: SFP.build-tasks.custom-build-task-1.EsrpCodeSigning@5
  displayName: 'Sign SDK NuGet package'
  inputs:
    ConnectedServiceName: 'OnnxrunTimeCodeSign_20240611'
    UseMSIAuthentication: true
    AppRegistrationClientId: '$(esrpClientId)'
    AppRegistrationTenantId: '$(esrpTenantId)'
    EsrpClientId: '$(esrpClientId)'
    AuthAKVName: '$(esrpAkvName)'
    AuthSignCertName: '$(esrpSignCertName)'
    FolderPath: '${{ parameters.outputDir }}'
    Pattern: '*.nupkg'
    SessionTimeout: 90
    ServiceEndpointUrl: 'https://api.esrp.microsoft.com/api/v2'
    MaxConcurrency: 25
    signConfigType: inlineSignParams
    inlineOperation: |
      [{"keyCode":"CP-401405","operationSetCode":"NuGetSign","parameters":[],"toolName":"sign","toolVersion":"6.2.9304.0"},{"keyCode":"CP-401405","operationSetCode":"NuGetVerify","parameters":[],"toolName":"sign","toolVersion":"6.2.9304.0"}]

