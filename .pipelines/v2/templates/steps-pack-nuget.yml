# Pack the Microsoft.AI.Foundry.Local.Runtime NuGet package from
# downloaded native artifacts.
#
# Inputs are downloaded by the parent job's templateContext.inputs into
# $(Pipeline.Workspace)/<artifactName>/.
#
# Produces Microsoft.AI.Foundry.Local.Runtime (win-x64, win-arm64, linux-x64,
# osx-arm64). On Windows the artifacts carry the reg-free WinML 2.x runtime DLL,
# which pack.py forwards automatically.

parameters:
- name: ortVersion
  type: string
- name: genaiVersion
  type: string

steps:

- task: NuGetToolInstaller@1
  displayName: 'Install NuGet'

- task: UsePythonVersion@0
  displayName: 'Use Python 3.x'
  inputs:
    versionSpec: '3.x'

# List downloaded pipeline artifacts so we can diagnose missing/misplaced files.
- task: PowerShell@2
  displayName: 'List downloaded artifacts'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      Write-Host "Pipeline.Workspace: $(Pipeline.Workspace)"
      Get-ChildItem "$(Pipeline.Workspace)" -Directory | ForEach-Object {
        Write-Host "`n=== $($_.Name) ==="
        Get-ChildItem $_.FullName -Recurse -File | ForEach-Object {
          Write-Host "  $($_.FullName.Substring("$(Pipeline.Workspace)".Length + 1))  ($([math]::Round($_.Length / 1KB, 1)) KB)"
        }
      }

- task: PowerShell@2
  displayName: 'Pack NuGet package'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $ErrorActionPreference = 'Stop'

      $version = (Get-Content "$(Pipeline.Workspace)/version-info/sdkVersion.txt" -Raw).Trim()
      Write-Host "Packing version: $version"

      $outDir = "$(Build.ArtifactStagingDirectory)/nuget"
      New-Item -ItemType Directory -Force -Path $outDir | Out-Null

      python "$(Build.SourcesDirectory)/sdk_v2/cpp/nuget/pack.py" `
        --version       "$version" `
        --package_id    "Microsoft.AI.Foundry.Local.Runtime" `
        --ort_version   "${{ parameters.ortVersion }}" `
        --genai_version "${{ parameters.genaiVersion }}" `
        --win_x64       "$(Pipeline.Workspace)/cpp-native-win-x64" `
        --win_arm64     "$(Pipeline.Workspace)/cpp-native-win-arm64" `
        --linux_x64     "$(Pipeline.Workspace)/cpp-native-linux-x64" `
        --osx_arm64     "$(Pipeline.Workspace)/cpp-native-osx-arm64" `
        --output_dir    "$outDir"

      Write-Host "Generated packages:"
      Get-ChildItem $outDir -Filter '*.nupkg' | ForEach-Object { Write-Host "  $($_.Name)" }
