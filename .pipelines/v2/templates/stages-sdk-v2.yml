# sdk_v2 coordinator: emits the full sdk_v2 stage graph.
#
# Composes:
#   1. Native C++ build + pack    (templates/stages-build-native.yml)
#   2. C# SDK base + WinML        (templates/stages-cs.yml × 2)
#   3. Python SDK base + WinML    (templates/stages-python.yml × 2)
#
# Assumes the caller has already emitted a `compute_version` stage that
# publishes the `version-info` pipeline artifact (containing sdkVersion.txt
# and pyVersion.txt). All downstream stages read from that artifact rather
# than recomputing a timestamp.

parameters:
- name: gateCondition
  type: string
  default: 'succeeded()'
- name: gateDependsOn
  type: object
  default: []
- name: buildConfig
  type: string
  default: 'RelWithDebInfo'
- name: ortVersion
  type: string
- name: ortVersionWinml
  type: string
- name: genaiVersion
  type: string
- name: winmlVersion
  type: string

stages:

# -- Artificial root: gates the entire v2 subgraph --
- stage: v2_gate
  displayName: 'sdk_v2 build gate'
  condition: ${{ parameters.gateCondition }}
  dependsOn: ${{ parameters.gateDependsOn }}
  jobs:
  - job: noop
    displayName: 'sdk_v2 build enabled'
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    steps:
    - checkout: none
    - script: echo "sdk_v2 build enabled"
      displayName: 'sdk_v2 build enabled'

# ── Native builds + pack ──
- template: stages-build-native.yml
  parameters:
    buildConfig: ${{ parameters.buildConfig }}
    ortVersion: ${{ parameters.ortVersion }}
    ortVersionWinml: ${{ parameters.ortVersionWinml }}
    genaiVersion: ${{ parameters.genaiVersion }}
    winmlVersion: ${{ parameters.winmlVersion }}
  dependsOn: 
  - v2_gate
  - compute_version

# ── C# SDK (base) ──
- template: stages-cs.yml
  parameters:
    variant: base

# ── C# SDK (WinML) ──
- template: stages-cs.yml
  parameters:
    variant: winml

# ── Python SDK (base) ──
- template: stages-python.yml
  parameters:
    variant: base

# ── Python SDK (WinML) ──
- template: stages-python.yml
  parameters:
    variant: winml

# ── JS SDK (single multi-platform tarball) ──
- template: stages-js.yml
