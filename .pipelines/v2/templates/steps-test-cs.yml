# Inner steps to restore, build, and run the sdk_v2 C# SDK test project
# (FoundryLocal.Tests). The caller is responsible for:
#   - placing the Foundry Local Runtime nupkg in `flNugetDir`
#   - downloading the `version-info` pipeline artifact
#   - populating the model cache directory at `testDataSharedDir`

parameters:
- name: flNugetDir
  type: string
  displayName: 'Path to directory containing the Foundry Local Runtime .nupkg'
- name: isWinML
  type: boolean
  default: false
- name: testDataSharedDir
  type: string
  displayName: 'Absolute path to the model cache directory used by tests'
- name: additionalTestArgs
  type: string
  default: ''
  displayName: 'Optional extra dotnet test arguments'

steps:

- task: UseDotNet@2
  displayName: 'Use .NET 10 SDK'
  inputs:
    packageType: sdk
    version: '10.0.x'

- task: UseDotNet@2
  displayName: 'Install .NET 9 runtime'
  inputs:
    packageType: runtime
    version: '9.0.x'

- task: UseDotNet@2
  displayName: 'Install .NET 8 runtime'
  inputs:
    packageType: runtime
    version: '8.0.x'

- task: PowerShell@2
  displayName: 'Set package version'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $v = (Get-Content "$(Pipeline.Workspace)/version-info/sdkVersion.txt" -Raw).Trim()
      Write-Host "Package version: $v"
      Write-Host "##vso[task.setvariable variable=packageVersion]$v"

- task: PowerShell@2
  displayName: 'Create NuGet.config with local Foundry Local Runtime feed'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $pkgPattern = 'Microsoft.AI.Foundry.Local.Runtime*.nupkg'
      $nupkg = Get-ChildItem "${{ parameters.flNugetDir }}" -Recurse -Filter $pkgPattern |
        Where-Object { $_.Name -notlike '*.snupkg' } | Select-Object -First 1
      if (-not $nupkg) { throw "No Microsoft.AI.Foundry.Local.Runtime*.nupkg found in ${{ parameters.flNugetDir }}" }
      $flFeedDir = $nupkg.DirectoryName
      Write-Host "Local Foundry Local Runtime feed directory: $flFeedDir"

      $nugetConfig = @"
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
          <add key="LocalFLRuntime" value="$flFeedDir" />
          <add key="AIFoundryLocal_PublicPackages" value="https://pkgs.dev.azure.com/aiinfra/AIFoundryLocal/_packaging/AIFoundryLocal_PublicPackages/nuget/v3/index.json" />
        </packageSources>
      </configuration>
      "@
      $configPath = "$(Build.ArtifactStagingDirectory)/NuGet.config"
      Set-Content -Path $configPath -Value $nugetConfig
      Write-Host "##vso[task.setvariable variable=customNugetConfig]$configPath"

- task: NuGetAuthenticate@1
  displayName: 'Authenticate NuGet feeds'

# Per-job NuGet isolation to prevent "Central Directory corrupt" / file-locking
# errors when multiple C# test jobs (regular + WinML) run concurrently on the
# same reused agent. Keyed by $(System.JobId); cleaned on each run.
- task: PowerShell@2
  displayName: 'Set isolated NuGet packages path'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $buildDir = "$(Build.BinariesDirectory)/nuget-isolated-$(System.JobId)"
      if (Test-Path $buildDir) {
        Remove-Item -Recurse -Force $buildDir
      }
      $pkgDir = "$buildDir/packages"
      $httpCacheDir = "$buildDir/http-cache"
      $pluginsCacheDir = "$buildDir/plugins-cache"
      foreach ($d in @($pkgDir, $httpCacheDir, $pluginsCacheDir)) {
        New-Item -ItemType Directory -Force -Path $d | Out-Null
      }
      Write-Host "##vso[task.setvariable variable=NUGET_PACKAGES]$pkgDir"
      Write-Host "##vso[task.setvariable variable=NUGET_HTTP_CACHE_PATH]$httpCacheDir"
      Write-Host "##vso[task.setvariable variable=NUGET_PLUGINS_CACHE_PATH]$pluginsCacheDir"
      Write-Host "NuGet isolation directory: $buildDir"

- task: PowerShell@2
  displayName: 'Restore & build tests'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $proj = "$(Build.SourcesDirectory)/sdk_v2/cs/test/FoundryLocal.Tests/Microsoft.AI.Foundry.Local.Tests.csproj"
      $rid = dotnet msbuild $proj -getProperty:NETCoreSdkRuntimeIdentifier
      if ($LASTEXITCODE -ne 0 -or -not $rid) { throw "Failed to determine RuntimeIdentifier" }
      Write-Host "Restoring for RuntimeIdentifier: $rid"

      dotnet restore $proj `
        --configfile "$(customNugetConfig)" `
        /p:UseWinML=${{ parameters.isWinML }} `
        /p:FoundryLocalRuntimeVersion=$(packageVersion) `
        /p:FoundryLocalNativeBinDir= `
        /p:RuntimeIdentifiers=$rid
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      dotnet build $proj `
        --no-restore --configuration Release `
        /p:UseWinML=${{ parameters.isWinML }} `
        /p:FoundryLocalRuntimeVersion=$(packageVersion) `
        /p:FoundryLocalNativeBinDir= `
        /p:RuntimeIdentifiers=$rid
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

- task: PowerShell@2
  displayName: 'Purge stale native redirect files'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      # Defense in depth: in CI we resolve foundry_local exclusively via the
      # Microsoft.AI.Foundry.Local.Runtime NuGet package (runtimes/<rid>/native/).
      # The redirect file foundry_local.native.cfg is a local-dev override that, if
      # present, takes priority in DllLoader and would silently point the loader at
      # an arbitrary path on the agent. Sweep it out of every bin folder before tests.
      $root = "$(Build.SourcesDirectory)/sdk_v2/cs"
      $stale = Get-ChildItem -Path $root -Recurse -Force -Filter 'foundry_local.native.cfg' -ErrorAction SilentlyContinue
      if ($stale) {
        Write-Host "Removing stale redirect files:"
        $stale | ForEach-Object { Write-Host "  $($_.FullName)"; Remove-Item -Force $_.FullName }
      } else {
        Write-Host "No stale foundry_local.native.cfg files found."
      }

- task: PowerShell@2
  displayName: 'Run SDK tests'
  inputs:
    targetType: inline
    pwsh: true
    script: |
      $proj = "$(Build.SourcesDirectory)/sdk_v2/cs/test/FoundryLocal.Tests/Microsoft.AI.Foundry.Local.Tests.csproj"

      # Test TFMs:
      #   * net9.0 covers the .NET (Core) runtime test surface.
      #   * net462 (Windows only, non-WinML) exercises the netstandard2.0 surface
      #     + polyfills at runtime on .NET Framework.
      # The csproj also targets net8.0, but only as build-time coverage — the .NET
      # back-compat guarantee means a successful net9.0 test run validates the same
      # assemblies for net8.0 consumers.
      $frameworks = @('net9.0')
      $isWin = $IsWindows -or ($PSVersionTable.Platform -eq $null)
      $isWinML = '${{ parameters.isWinML }}' -eq 'True'
      if ($isWin -and -not $isWinML) {
        $frameworks += 'net462'
      }

      foreach ($tfm in $frameworks) {
        Write-Host "=== dotnet test --framework $tfm ==="
        dotnet test $proj `
          --no-build --configuration Release `
          --framework $tfm `
          /p:UseWinML=${{ parameters.isWinML }} `
          ${{ parameters.additionalTestArgs }}
        if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      }
  env:
    TF_BUILD: 'true'
    FOUNDRY_TEST_DATA_DIR: ${{ parameters.testDataSharedDir }}
