# Build + test stages for the sdk_v2 C# SDK.
#
# Produces Microsoft.AI.Foundry.Local (build + test win/linux/osx). On Windows
# the native runtime it consumes bundles the reg-free WinML 2.x runtime, so a
# single package serves every platform.
#
# Depends on the native pack stage from stages-build-native.yml:
#   cpp_pack_nuget  (artifact: cpp-nuget)
#
# Produces a `cs-sdk-v2` pipeline artifact containing the signed .nupkg (+ .snupkg).

stages:

# ====================================================================
# Build stage — produces the C# SDK NuGet package.
# ====================================================================
- stage: cs_build
  displayName: 'C# SDK: Build'
  dependsOn:
  - compute_version
  - cpp_pack_nuget
  jobs:
  - job: build
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'version-info'
        targetPath: '$(Pipeline.Workspace)/version-info'
      - input: pipelineArtifact
        artifactName: 'cpp-nuget'
        targetPath: '$(Pipeline.Workspace)/cpp-nuget'
      outputs:
      - output: pipelineArtifact
        artifactName: 'cs-sdk-v2'
        targetPath: '$(Build.ArtifactStagingDirectory)/cs-sdk'
    steps:
    - checkout: self
      clean: true
    - template: steps-build-cs.yml
      parameters:
        flNugetDir: '$(Pipeline.Workspace)/cpp-nuget'
        outputDir: '$(Build.ArtifactStagingDirectory)/cs-sdk'

# ====================================================================
# Test — Windows x64
# ====================================================================
- stage: cs_test_win_x64
  displayName: 'C# SDK: Test Windows x64'
  dependsOn:
  - cs_build
  jobs:
  - job: test
    pool:
      name: onnxruntime-Win-CPU-2022
      os: windows
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'version-info'
        targetPath: '$(Pipeline.Workspace)/version-info'
      - input: pipelineArtifact
        artifactName: 'cpp-nuget'
        targetPath: '$(Pipeline.Workspace)/cpp-nuget'
    steps:
    - checkout: self
      clean: true
    - template: ../../templates/fetch-test-data-from-blob.yml@self
    - template: steps-test-cs.yml
      parameters:
        flNugetDir: '$(Pipeline.Workspace)/cpp-nuget'
        testDataSharedDir: '$(Build.SourcesDirectory)/test-data-shared'

# ====================================================================
# Test — Linux x64 / macOS ARM64
# ====================================================================
- stage: cs_test_linux_x64
  displayName: 'C# SDK: Test Linux x64'
  dependsOn:
  - cs_build
  jobs:
  - job: test
    pool:
      name: onnxruntime-Ubuntu2404-AMD-CPU
      os: linux
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'version-info'
        targetPath: '$(Pipeline.Workspace)/version-info'
      - input: pipelineArtifact
        artifactName: 'cpp-nuget'
        targetPath: '$(Pipeline.Workspace)/cpp-nuget'
    steps:
    - checkout: self
      clean: true
    - template: ../../templates/fetch-test-data-from-blob.yml@self
    - template: steps-test-cs.yml
      parameters:
        flNugetDir: '$(Pipeline.Workspace)/cpp-nuget'
        testDataSharedDir: '$(Build.SourcesDirectory)/test-data-shared'

- stage: cs_test_osx_arm64
  displayName: 'C# SDK: Test macOS ARM64'
  dependsOn:
  - cs_build
  jobs:
  - job: test
    pool:
      name: AcesShared
      os: macOS
      demands:
      - ImageOverride -equals ACES_VM_SharedPool_Sequoia
    templateContext:
      inputs:
      - input: pipelineArtifact
        artifactName: 'version-info'
        targetPath: '$(Pipeline.Workspace)/version-info'
      - input: pipelineArtifact
        artifactName: 'cpp-nuget'
        targetPath: '$(Pipeline.Workspace)/cpp-nuget'
    steps:
    - checkout: self
      clean: true
    - template: ../../templates/fetch-test-data-from-blob.yml@self
    - template: steps-test-cs.yml
      parameters:
        flNugetDir: '$(Pipeline.Workspace)/cpp-nuget'
        testDataSharedDir: '$(Build.SourcesDirectory)/test-data-shared'
        additionalTestArgs: '--settings $(Build.SourcesDirectory)/sdk_v2/cs/test/FoundryLocal.Tests/sequential.runsettings'
