# Shared template to update deps_versions.json from pipeline artifacts.
# If an artifact directory containing a pipeline-generated deps_versions.json
# is provided, it overwrites the repo copy so that SDK builds use the
# exact versions from the FLC build. Each SDK reads deps_versions.json
# directly via its own tooling (MSBuild, Node require(), serde_json, etc.).
parameters:
- name: repoRoot
  type: string
  default: '$(repoRoot)'
- name: artifactDir
  type: string
  default: ''
  displayName: 'Path to artifact directory containing pipeline-generated deps_versions.json'
- name: isWinML
  type: boolean
  default: false

steps:
- task: PowerShell@2
  displayName: 'Update deps_versions.json from pipeline artifact'
  inputs:
    targetType: inline
    script: |
      $repoJson = "${{ parameters.repoRoot }}/sdk/deps_versions.json"
      $artifactDir = "${{ parameters.artifactDir }}"

      if ($artifactDir -eq '' -or -not (Test-Path "$artifactDir/deps_versions.json")) {
        throw "Pipeline-built deps_versions.json not found in artifact directory: $artifactDir"
      }

      Copy-Item "$artifactDir/deps_versions.json" $repoJson -Force
      Write-Host "Updated repo deps_versions.json from pipeline artifact at $artifactDir"

      $deps = Get-Content $repoJson -Raw | ConvertFrom-Json
      $isWinML = "${{ parameters.isWinML }}" -eq "True"

      # Log resolved versions for debugging
      $flcNuget = if ($isWinML) { $deps.'foundry-local-core'.'nuget-winml' } else { $deps.'foundry-local-core'.nuget }
      $flcPython = if ($isWinML) { $deps.'foundry-local-core'.'python-winml' } else { $deps.'foundry-local-core'.python }
      $ort = if ($isWinML) { $deps.onnxruntime.winml } else { $deps.onnxruntime.'cross-plat' }
      $genaiNuget = if ($isWinML) { $deps.'onnxruntime-genai'.'nuget-winml' } else { $deps.'onnxruntime-genai'.nuget }
      $genaiPython = if ($isWinML) { $deps.'onnxruntime-genai'.'python-winml' } else { $deps.'onnxruntime-genai'.python }

      Write-Host "Dependency versions from deps_versions.json:"
      Write-Host "  FLC Core (NuGet):  $flcNuget"
      Write-Host "  FLC Core (Python): $flcPython"
      Write-Host "  OnnxRuntime:       $ort"
      Write-Host "  GenAI (NuGet):     $genaiNuget"
      Write-Host "  GenAI (Python):    $genaiPython"
