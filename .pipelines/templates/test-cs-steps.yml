# Steps to test the C# SDK.
# Expects the SDK to be already built and the NuGet package available.
parameters:
- name: isWinML
  type: boolean
  default: false
- name: flcNugetDir
  type: string
  displayName: 'Path to directory containing the FLC .nupkg'
- name: depsVersionsDir
  type: string
  default: ''
  displayName: 'Path to deps-versions artifact directory'

steps:
- task: PowerShell@2
  displayName: 'Set source paths'
  inputs:
    targetType: inline
    script: |
      $multiCheckout = "$(Build.SourcesDirectory)/Foundry-Local"
      if (Test-Path $multiCheckout) {
        $repoRoot = $multiCheckout
      } else {
        $repoRoot = "$(Build.SourcesDirectory)"
      }
      $testDataDir = "$(Build.SourcesDirectory)/test-data-shared"
      Write-Host "##vso[task.setvariable variable=repoRoot]$repoRoot"
      Write-Host "##vso[task.setvariable variable=testDataDir]$testDataDir"

- task: UseDotNet@2
  displayName: 'Use .NET 9 SDK'
  inputs:
    packageType: sdk
    version: '9.0.x'

# Load dependency versions from deps_versions.json
- template: update-deps-versions-steps.yml
  parameters:
    repoRoot: $(repoRoot)
    artifactDir: ${{ parameters.depsVersionsDir }}
    isWinML: ${{ parameters.isWinML }}

# Create a temporary NuGet.config that includes the local FLC feed
- task: PowerShell@2
  displayName: 'Create NuGet.config with local FLC feed'
  inputs:
    targetType: inline
    script: |
      $nugetConfig = @"
      <?xml version="1.0" encoding="utf-8"?>
      <configuration>
        <packageSources>
          <clear />
          <add key="nuget.org" value="https://api.nuget.org/v3/index.json" />
          <add key="LocalFLC" value="${{ parameters.flcNugetDir }}" />
          <add key="ORT-Nightly" value="https://pkgs.dev.azure.com/aiinfra/PublicPackages/_packaging/ORT-Nightly/nuget/v3/index.json" />
        </packageSources>
      </configuration>
      "@
      $nupkg = Get-ChildItem "${{ parameters.flcNugetDir }}" -Recurse -Filter "Microsoft.AI.Foundry.Local.Core*.nupkg" -Exclude "*.snupkg" | Select-Object -First 1
      if (-not $nupkg) { throw "No FLC .nupkg found in ${{ parameters.flcNugetDir }}" }
      $flcFeedDir = $nupkg.DirectoryName
      $nugetConfig = $nugetConfig -replace [regex]::Escape("${{ parameters.flcNugetDir }}"), $flcFeedDir
      $configPath = "$(Build.ArtifactStagingDirectory)/NuGet.config"
      Set-Content -Path $configPath -Value $nugetConfig
      Write-Host "##vso[task.setvariable variable=customNugetConfig]$configPath"
      Write-Host "Local FLC feed directory: $flcFeedDir"

- task: NuGetAuthenticate@1
  displayName: 'Authenticate NuGet feeds'

- ${{ if eq(parameters.isWinML, true) }}:
  - task: PowerShell@2
    displayName: 'Install Windows App SDK Runtime'
    inputs:
      targetType: 'inline'
      script: |
        $installerUrl = "https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe"
        $installerPath = "$env:TEMP\windowsappruntimeinstall.exe"
        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
        & $installerPath --quiet --force
        if ($LASTEXITCODE -ne 0) { throw "Windows App SDK Runtime install failed" }
      errorActionPreference: 'stop'

# Use a per-build NuGet packages directory to avoid corruption and file-locking
# issues from the shared global cache on reused agents.
# https://learn.microsoft.com/en-us/nuget/reference/cli-reference/cli-ref-environment-variables
- task: PowerShell@2
  displayName: 'Set isolated NuGet packages path'
  inputs:
    targetType: inline
    script: |
      $pkgDir = "$(Build.BinariesDirectory)/nuget-packages"
      New-Item -ItemType Directory -Force -Path $pkgDir | Out-Null
      Write-Host "##vso[task.setvariable variable=NUGET_PACKAGES]$pkgDir"
      Write-Host "NuGet packages directory: $pkgDir"

- task: PowerShell@2
  displayName: 'Restore & build tests'
  inputs:
    targetType: inline
    script: |
      $rid = dotnet msbuild "$(repoRoot)/sdk/cs/test/FoundryLocal.Tests/Microsoft.AI.Foundry.Local.Tests.csproj" -getProperty:NETCoreSdkRuntimeIdentifier
      if ($LASTEXITCODE -ne 0 -or -not $rid) { throw "Failed to determine RuntimeIdentifier" }
      Write-Host "Restoring for RuntimeIdentifier: $rid"

      dotnet restore "$(repoRoot)/sdk/cs/test/FoundryLocal.Tests/Microsoft.AI.Foundry.Local.Tests.csproj" `
        --configfile "$(customNugetConfig)" `
        /p:UseWinML=${{ parameters.isWinML }} `
        /p:RuntimeIdentifiers=$rid
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      dotnet build "$(repoRoot)/sdk/cs/test/FoundryLocal.Tests/Microsoft.AI.Foundry.Local.Tests.csproj" `
        --no-restore --configuration Release `
        /p:UseWinML=${{ parameters.isWinML }} `
        /p:RuntimeIdentifiers=$rid
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

- task: PowerShell@2
  displayName: 'Run SDK tests'
  inputs:
    targetType: inline
    script: |
      dotnet test "$(repoRoot)/sdk/cs/test/FoundryLocal.Tests/Microsoft.AI.Foundry.Local.Tests.csproj" `
        --no-build --configuration Release `
        /p:UseWinML=${{ parameters.isWinML }}
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
  env:
    TF_BUILD: 'true'
