# Steps to test the Python SDK.
# Expects the SDK wheel to be already built via build-python-steps.yml.
parameters:
- name: isWinML
  type: boolean
  default: false
- name: flcWheelsDir
  type: string
  displayName: 'Path to directory containing the FLC wheels'
- name: sdkWheelsDir
  type: string
  displayName: 'Path to directory containing the built SDK wheel'
- name: depsVersionsDir
  type: string
  default: ''
  displayName: 'Path to deps-versions artifact directory'

steps:
- task: PowerShell@2
  displayName: 'Set source paths'
  inputs:
    targetType: inline
    script: |
      $multiCheckout = "$(Build.SourcesDirectory)/Foundry-Local"
      if (Test-Path $multiCheckout) {
        $repoRoot = $multiCheckout
      } else {
        $repoRoot = "$(Build.SourcesDirectory)"
      }
      $testDataDir = "$(Build.SourcesDirectory)/test-data-shared"
      Write-Host "##vso[task.setvariable variable=repoRoot]$repoRoot"
      Write-Host "##vso[task.setvariable variable=testDataDir]$testDataDir"

- task: PowerShell@2
  displayName: 'Detect Python architecture'
  inputs:
    targetType: inline
    script: |
      # UsePythonVersion defaults to x64 but arm64 agents only have arm64 Python.
      # The hosted *Linux* arm64 image has no python-versions toolcache entry,
      # so we skip UsePythonVersion there and rely on the system python.
      # macOS arm64 hosted agents DO have a python-versions toolcache and work
      # normally with UsePythonVersion (the toolcache provides `pip` on PATH).
      $isArm64 = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq 'Arm64'
      $isLinuxArm64 = $IsLinux -and $isArm64
      $arch = if ($isArm64) { 'ARM64' } else { 'x64' }
      Write-Host "##vso[task.setvariable variable=PythonArch]$arch"
      Write-Host "##vso[task.setvariable variable=IsLinuxArm64Agent]$($isLinuxArm64.ToString().ToLower())"
      Write-Host "Detected Python architecture: $arch; IsLinuxArm64Agent=$isLinuxArm64"

- task: UsePythonVersion@0
  displayName: 'Use Python 3.12'
  condition: and(succeeded(), ne(variables['IsLinuxArm64Agent'], 'true'))
  inputs:
    versionSpec: '3.12'
    architecture: '$(PythonArch)'

- task: PowerShell@2
  displayName: 'Configure system Python for user-mode installs (Linux arm64)'
  condition: and(succeeded(), eq(variables['IsLinuxArm64Agent'], 'true'))
  inputs:
    targetType: inline
    script: |
      # System python on hosted Linux arm64 cannot write to /usr/lib/python3.12/site-packages.
      # Force all subsequent `pip install` calls to use the per-user site and put
      # the user-script directory on PATH so console-scripts (e.g. pytest) are reachable.
      # The image also only exposes `python3` (no `python` alias), so drop a wrapper
      # symlink into the user-bin directory for scripts that invoke `python` directly.
      python3 --version
      $userBase = & python3 -c "import site; print(site.USER_BASE)"
      $userBin = Join-Path $userBase 'bin'
      New-Item -ItemType Directory -Force -Path $userBin | Out-Null
      $python3Path = (& which python3).Trim()
      & ln -sf $python3Path (Join-Path $userBin 'python')
      Write-Host "User base: $userBase"
      Write-Host "Created symlink: $userBin/python -> $python3Path"
      Write-Host "##vso[task.setvariable variable=PIP_USER]1"
      Write-Host "##vso[task.prependpath]$userBin"

# Load dependency versions from deps_versions.json
- template: update-deps-versions-steps.yml
  parameters:
    repoRoot: $(repoRoot)
    artifactDir: ${{ parameters.depsVersionsDir }}
    isWinML: ${{ parameters.isWinML }}

# Configure pip to use ORT-Nightly feed (plus PyPI as fallback)
- task: PowerShell@2
  displayName: 'Configure pip for Azure Artifacts'
  inputs:
    targetType: inline
    script: |
      pip config set global.index-url https://pkgs.dev.azure.com/aiinfra/PublicPackages/_packaging/ORT-Nightly/pypi/simple/
      pip config set global.extra-index-url https://pypi.org/simple/
      pip config set global.pre true

# Install the FLC wheel from the pipeline
- task: PowerShell@2
  displayName: 'Install pipeline-built FLC wheel'
  inputs:
    targetType: inline
    script: |
      $arch = if ([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq 'Arm64') { 'arm64' } else { 'amd64' }
      if ($IsLinux) {
        $linuxArch = if ([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq 'Arm64') { 'aarch64' } else { 'x86_64' }
        $platTag = "manylinux*$linuxArch"
      }
      elseif ($IsMacOS) { $platTag = "macosx*$arch" }
      else { $platTag = "win_$arch" }

      $filter = if ("${{ parameters.isWinML }}" -eq "True") { "foundry_local_core_winml*$platTag.whl" } else { "foundry_local_core-*$platTag.whl" }
      $wheel = Get-ChildItem "${{ parameters.flcWheelsDir }}" -Recurse -Filter $filter | Select-Object -First 1
      if ($wheel) {
        Write-Host "Installing pipeline-built FLC wheel: $($wheel.FullName)"
        pip install $($wheel.FullName)
      } else {
        Write-Warning "No FLC wheel found matching $filter in ${{ parameters.flcWheelsDir }}"
      }

- task: PowerShell@2
  displayName: 'Install ORT native packages'
  inputs:
    targetType: inline
    script: |
      $isWinML = "${{ parameters.isWinML }}" -eq "True"
      $fileName = if ($isWinML) { "deps_versions_winml.json" } else { "deps_versions.json" }
      $deps = Get-Content "$(repoRoot)/sdk/$fileName" -Raw | ConvertFrom-Json
      $ortVer = $deps.onnxruntime.version
      $genaiVer = $deps.'onnxruntime-genai'.version
      # Platform-specific ORT package selection:
      # - Linux x86_64:  onnxruntime-gpu / onnxruntime-genai-cuda (CUDA wheels).
      # - Linux aarch64: onnxruntime / onnxruntime-genai (CUDA variants don't ship aarch64).
      # - Other:         onnxruntime-core / onnxruntime-genai-core (cross-platform).
      $isArm64 = [System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq 'Arm64'
      if ($IsLinux -and -not $isArm64) {
        Write-Host "Installing onnxruntime-gpu==$ortVer onnxruntime-genai-cuda==$genaiVer (Linux x64)"
        pip install "onnxruntime-gpu==$ortVer" "onnxruntime-genai-cuda==$genaiVer"
      } elseif ($IsLinux -and $isArm64) {
        Write-Host "Installing onnxruntime==$ortVer onnxruntime-genai==$genaiVer (Linux arm64)"
        pip install "onnxruntime==$ortVer" "onnxruntime-genai==$genaiVer"
      } else {
        Write-Host "Installing onnxruntime-core==$ortVer onnxruntime-genai-core==$genaiVer"
        pip install "onnxruntime-core==$ortVer" "onnxruntime-genai-core==$genaiVer"
      }
      if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

- script: pip install "pydantic>=2.0.0" "requests>=2.32.4" "openai>=2.24.0"
  displayName: 'Install pure python dependencies'

# Install the built SDK wheel
- task: PowerShell@2
  displayName: 'Install SDK wheel'
  inputs:
    targetType: inline
    script: |
      $wheel = (Get-ChildItem "${{ parameters.sdkWheelsDir }}/*.whl" | Select-Object -First 1).FullName
      pip install --no-deps $wheel

- ${{ if eq(parameters.isWinML, true) }}:
  - task: PowerShell@2
    displayName: 'Install Windows App SDK Runtime'
    inputs:
      targetType: 'inline'
      script: |
        $installerUrl = "https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe"
        $installerPath = "$env:TEMP\windowsappruntimeinstall.exe"
        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
        & $installerPath --quiet --force
        if ($LASTEXITCODE -ne 0) { throw "Windows App SDK Runtime install failed" }
      errorActionPreference: 'stop'

- script: pip install coverage pytest>=7.0.0 pytest-timeout>=2.1.0
  displayName: 'Install test dependencies'

- script: python -m pytest test/ -v
  displayName: 'Run tests'
  workingDirectory: $(repoRoot)/sdk/python
  env:
    TF_BUILD: 'true'
    FOUNDRY_TEST_DATA_DIR: $(testDataDir)
