# Steps to build and pack the JS SDK.
# When test-data-shared is checked out alongside self, ADO places repos under
# $(Build.SourcesDirectory)/<repo-name>. The self repo is 'Foundry-Local'.
parameters:
- name: version
  type: string
- name: isRelease
  type: boolean
  default: false
- name: isWinML
  type: boolean
  default: false
- name: flcNugetDir
  type: string
  default: ''
  displayName: 'Path to directory containing the FLC .nupkg (for tests)'
- name: prereleaseId
  type: string
  default: ''
- name: depsVersionsDir
  type: string
  default: ''
  displayName: 'Path to deps-versions artifact directory'
steps:
# Set paths for multi-repo checkout
- task: PowerShell@2
  displayName: 'Set source paths'
  inputs:
    targetType: inline
    script: |
      $repoRoot = "$(Build.SourcesDirectory)/Foundry-Local"
      $testDataDir = "$(Build.SourcesDirectory)/test-data-shared"
      Write-Host "##vso[task.setvariable variable=repoRoot]$repoRoot"
      Write-Host "##vso[task.setvariable variable=testDataDir]$testDataDir"
      Write-Host "Repo root: $repoRoot"
      Write-Host "Test data: $testDataDir"

- task: PowerShell@2
  displayName: 'List downloaded FLC artifact'
  condition: and(succeeded(), ne('${{ parameters.flcNugetDir }}', ''))
  inputs:
    targetType: inline
    script: |
      Write-Host "Contents of ${{ parameters.flcNugetDir }}:"
      Get-ChildItem "${{ parameters.flcNugetDir }}" -Recurse | ForEach-Object { Write-Host $_.FullName }

- task: NodeTool@0
  displayName: 'Use Node.js 20'
  inputs:
    versionSpec: '20.x'

# Build the Node-API native addon for this platform (if not already prebuilt)
- task: PowerShell@2
  displayName: 'Build Node-API addon (if needed)'
  inputs:
    targetType: inline
    script: |
      $platformKey = "$(node -e "process.stdout.write(process.platform + '-' + process.arch)")"
      $prebuiltPath = "$(repoRoot)/sdk/js/prebuilds/$platformKey/foundry_local_napi.node"
      if (Test-Path $prebuiltPath) {
        Write-Host "Prebuilt addon already exists at $prebuiltPath, skipping build."
      } else {
        Write-Host "No prebuilt addon found for $platformKey, building from source..."
        Set-Location "$(repoRoot)/sdk/js"
        npm install --no-save node-gyp node-api-headers --registry https://registry.npmjs.org
        Set-Location native
        npx node-gyp rebuild
        $destDir = "$(repoRoot)/sdk/js/prebuilds/$platformKey"
        New-Item -ItemType Directory -Path $destDir -Force | Out-Null
        Copy-Item "build/Release/foundry_local_napi.node" "$destDir/foundry_local_napi.node" -Force
        Write-Host "Built addon for $platformKey -> $destDir/foundry_local_napi.node"
      }

# Load dependency versions from deps_versions.json
- template: update-deps-versions-steps.yml
  parameters:
    repoRoot: $(repoRoot)
    artifactDir: ${{ parameters.depsVersionsDir }}
    isWinML: ${{ parameters.isWinML }}

# Compute version
- task: PowerShell@2
  displayName: 'Set package version'
  inputs:
    targetType: inline
    script: |
      $v = (Get-Content "$(Pipeline.Workspace)/version-info/sdkVersion.txt" -Raw).Trim()
      Write-Host "Package version: $v"
      Write-Host "##vso[task.setvariable variable=packageVersion]$v"

# Install JS dependencies. When a pipeline-built FLC artifact is provided,
# use --ignore-scripts to skip the native binary download (which would 404
# on the unpublished FLC package), then extract FLC from the local artifact
# and run the install script manually to fetch ORT/GenAI from public feeds.
- task: Npm@1
  displayName: 'npm install (skip native downloads)'
  inputs:
    command: custom
    workingDir: $(repoRoot)/sdk/js
    customCommand: 'install --ignore-scripts'

- task: PowerShell@2
  displayName: 'Extract FLC from pipeline-built artifact'
  inputs:
    targetType: inline
    script: |
      $os = 'win32'
      $arch = if ([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq 'Arm64') { 'arm64' } else { 'x64' }
      $platformKey = "$os-$arch"
      $rid = if ($arch -eq 'arm64') { 'win-arm64' } else { 'win-x64' }

      if ($IsLinux) {
        $os = 'linux'
        $platformKey = "$os-$arch"
        $rid = "linux-$arch"
      } elseif ($IsMacOS) {
        $os = 'darwin'
        $platformKey = "$os-$arch"
        $rid = "osx-$arch"
      }

      $nupkg = Get-ChildItem "${{ parameters.flcNugetDir }}" -Recurse -Filter "Microsoft.AI.Foundry.Local.Core*.nupkg" -Exclude "*.snupkg" | Select-Object -First 1
      if (-not $nupkg) { throw "No FLC .nupkg found in ${{ parameters.flcNugetDir }}" }

      $extractDir = "$(Build.ArtifactStagingDirectory)/flc-extract"
      $zip = [System.IO.Path]::ChangeExtension($nupkg.FullName, ".zip")
      Copy-Item $nupkg.FullName $zip -Force
      Expand-Archive -Path $zip -DestinationPath $extractDir -Force

      # Place FLC binary so the install script skips downloading it
      $destDir = "$(repoRoot)/sdk/js/node_modules/@foundry-local-core/$platformKey"
      New-Item -ItemType Directory -Path $destDir -Force | Out-Null
      $nativeDir = "$extractDir/runtimes/$rid/native"
      if (Test-Path $nativeDir) {
        Get-ChildItem $nativeDir -File | ForEach-Object {
          Copy-Item $_.FullName -Destination "$destDir/$($_.Name)" -Force
          Write-Host "Placed $($_.Name) from pipeline artifact"
        }
      } else {
        Write-Warning "No native binaries found at $nativeDir for RID $rid"
      }

- task: PowerShell@2
  displayName: 'Run native binary install (ORT + GenAI)'
  inputs:
    targetType: inline
    script: |
      Set-Location "$(repoRoot)/sdk/js"
      node script/preinstall.cjs
      node script/install-standard.cjs

# Overwrite the FLC native binary with the one we just built
- task: PowerShell@2
  displayName: 'Overwrite FLC with pipeline-built binary'
  condition: and(succeeded(), ne('${{ parameters.flcNugetDir }}', ''))
  inputs:
    targetType: inline
    script: |
      $os = 'win32'
      $arch = if ([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture -eq 'Arm64') { 'arm64' } else { 'x64' }
      $platformKey = "$os-$arch"
      $rid = if ($arch -eq 'arm64') { 'win-arm64' } else { 'win-x64' }

      # Detect macOS/Linux
      if ($IsLinux) {
        $os = 'linux'
        $platformKey = "$os-$arch"
        $rid = "linux-$arch"
      } elseif ($IsMacOS) {
        $os = 'darwin'
        $platformKey = "$os-$arch"
        $rid = "osx-$arch"
      }

      $nupkg = Get-ChildItem "${{ parameters.flcNugetDir }}" -Recurse -Filter "Microsoft.AI.Foundry.Local.Core*.nupkg" -Exclude "*.snupkg" | Select-Object -First 1
      if (-not $nupkg) { throw "No FLC .nupkg found in ${{ parameters.flcNugetDir }}" }

      # Extract the NuGet package (it's a zip)
      $extractDir = "$(Build.ArtifactStagingDirectory)/flc-extract"
      $zip = [System.IO.Path]::ChangeExtension($nupkg.FullName, ".zip")
      Copy-Item $nupkg.FullName $zip -Force
      Expand-Archive -Path $zip -DestinationPath $extractDir -Force

      # Overwrite FLC binary in the npm-installed location
      $destDir = "$(repoRoot)/sdk/js/node_modules/@foundry-local-core/$platformKey"
      New-Item -ItemType Directory -Path $destDir -Force | Out-Null
      $nativeDir = "$extractDir/runtimes/$rid/native"
      if (Test-Path $nativeDir) {
        Get-ChildItem $nativeDir -File | ForEach-Object {
          Copy-Item $_.FullName -Destination "$destDir/$($_.Name)" -Force
          Write-Host "Overwrote $($_.Name) with pipeline-built version"
        }
      } else {
        Write-Warning "No native binaries found at $nativeDir for RID $rid"
      }

      Write-Host "Final binaries in $destDir`:"
      Get-ChildItem $destDir | ForEach-Object { Write-Host "  $($_.Name)" }

- task: Npm@1
  displayName: 'npm version'
  inputs:
    command: custom
    workingDir: $(repoRoot)/sdk/js
    customCommand: 'version $(packageVersion) --no-git-tag-version --allow-same-version'

- task: Npm@1
  displayName: 'npm build'
  inputs:
    command: custom
    workingDir: $(repoRoot)/sdk/js
    customCommand: 'run build'

- ${{ if eq(parameters.isWinML, true) }}:
  - task: Npm@1
    displayName: 'npm run pack:winml'
    inputs:
      command: custom
      workingDir: $(repoRoot)/sdk/js
      customCommand: 'run pack:winml'

- ${{ else }}:
  - task: Npm@1
    displayName: 'npm run pack'
    inputs:
      command: custom
      workingDir: $(repoRoot)/sdk/js
      customCommand: 'run pack'

- task: PowerShell@2
  displayName: 'Stage artifact'
  inputs:
    targetType: inline
    script: |
      $destDir = "$(Build.ArtifactStagingDirectory)/js-sdk"
      New-Item -ItemType Directory -Path $destDir -Force | Out-Null
      Copy-Item "$(repoRoot)/sdk/js/*.tgz" "$destDir/"

# ── Tests ──
- ${{ if eq(parameters.isWinML, true) }}:
  - task: PowerShell@2
    displayName: 'Install Windows App SDK Runtime'
    inputs:
      targetType: 'inline'
      script: |
        $installerUrl = "https://aka.ms/windowsappsdk/1.8/latest/windowsappruntimeinstall-x64.exe"
        $installerPath = "$env:TEMP\windowsappruntimeinstall.exe"
        Invoke-WebRequest -Uri $installerUrl -OutFile $installerPath
        & $installerPath --quiet --force
        if ($LASTEXITCODE -ne 0) { throw "Windows App SDK Runtime install failed" }
      errorActionPreference: 'stop'

- task: Npm@1
  displayName: 'npm test'
  inputs:
    command: custom
    workingDir: $(repoRoot)/sdk/js
    customCommand: 'test'
  env:
    TF_BUILD: 'true'
