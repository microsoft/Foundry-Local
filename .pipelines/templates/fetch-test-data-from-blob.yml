# Download test model data from blob storage into a local directory.
# Uses azcopy with AZCLI auth so the agent identity can read from storage.

parameters:
- name: destinationPath
  type: string
  default: '$(Build.SourcesDirectory)/test-data-shared'

steps:
- task: AzureCLI@2
  displayName: 'Fetch test data from blob'
  inputs:
    azureSubscription: 'ortcibuild_readonly_mi2-ONNX Runtime-AIFoundryLocal'
    scriptType: pscore
    scriptLocation: inlineScript
    inlineScript: |
      $ErrorActionPreference = 'Stop'

      $destination = '${{ parameters.destinationPath }}'
      $storageAccount = 'foundrylocalmodels'
      $container = 'models'
      $prefix = 'foundrylocal/models'

      New-Item -ItemType Directory -Path $destination -Force | Out-Null

      function Invoke-AzCopy {
        param(
          [string]$Source,
          [string]$Target
        )

        $parent = Split-Path -Path $Target -Parent
        if (-not [string]::IsNullOrEmpty($parent)) {
          New-Item -ItemType Directory -Path $parent -Force | Out-Null
        }

        $args = @('copy', $Source, $Target, '--recursive')

        & azcopy @args
        if ($LASTEXITCODE -ne 0) {
          throw "azcopy failed downloading test data from $Source"
        }
      }

      function Get-FirstBlobMatch {
        param(
          [string]$BlobPrefix
        )

        $match = az storage blob list `
          --account-name $storageAccount `
          --container-name $container `
          --auth-mode login `
          --prefix $BlobPrefix `
          --num-results 1 `
          --query "[0].name" `
          -o tsv

        if ($LASTEXITCODE -ne 0) {
          throw "Failed to probe blob prefix: $BlobPrefix"
        }

        return $match
      }

      $modelPaths = @(
        'qwen2.5-0.5b-instruct',
        'openai-whisper-tiny',
        'openai-whisper-tiny',
        'nemotron-speech-streaming-en-0.6b',
        'qwen3-embedding-0.6b',
        'qwen3.5-0.8b'
      )

      $missingPaths = @()

      foreach ($relativePath in $modelPaths) {
        $blobPrefix = "$prefix/$relativePath/"
        $requestedUrl = "https://$storageAccount.blob.core.windows.net/$container/$blobPrefix*"
        Write-Host "Requested blob URL: $requestedUrl"

        $match = Get-FirstBlobMatch -BlobPrefix $blobPrefix
        if ([string]::IsNullOrWhiteSpace($match)) {
          Write-Warning "No blobs found for $requestedUrl"
          $missingPaths += $relativePath
          continue
        }

        $target = Join-Path $destination $relativePath
        Invoke-AzCopy -Source $requestedUrl -Target $target
      }

      if ($missingPaths.Count -gt 0) {
        Write-Warning "Missing model paths in blob storage: $($missingPaths -join ', ')"
      }

      $count = @(Get-ChildItem -Path $destination -Recurse -File).Count

      if ($count -eq 0) {
        throw "Downloaded test data is empty at $destination"
      }

      Write-Host "Downloaded $count files into $destination"
  env:
    AZCOPY_AUTO_LOGIN_TYPE: AZCLI
