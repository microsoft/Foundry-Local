# Clones an Azure DevOps Git repo using a service connection.
# Replaces `checkout: <repo>` for repos that cannot use PAT-based endpoints.
#
# The repo is cloned into $(Build.SourcesDirectory)/<repoName> to match the
# directory layout that multi-checkout produces.
parameters:
- name: repoName
  type: string
  displayName: 'Repository name (also used as the checkout directory name)'
- name: ref
  type: string
  default: 'refs/heads/main'
  displayName: 'Git ref to checkout (branch, tag, or commit SHA)'
- name: basePath
  type: string
  default: '$(Build.SourcesDirectory)'
  displayName: 'Base directory to clone into (repo will be at basePath/repoName)'

steps:
# Install pwsh and Azure CLI on ARM64 agents if missing
- task: PowerShell@2
  displayName: 'Install prerequisites (ARM64)'
  condition: and(eq(variables['Agent.OSArchitecture'], 'ARM64'), eq(variables['Agent.OS'], 'Windows_NT'))
  inputs:
    targetType: inline
    script: |
      if (-not (Get-Command pwsh -ErrorAction SilentlyContinue)) {
        Write-Host "Installing PowerShell Core..."
        $arch = if ($env:PROCESSOR_ARCHITECTURE -eq 'ARM64') { 'arm64' } else { 'x64' }
        $msiUrl = "https://github.com/PowerShell/PowerShell/releases/download/v7.4.7/PowerShell-7.4.7-win-${arch}.msi"
        Invoke-WebRequest -Uri $msiUrl -OutFile "$env:TEMP\PowerShell.msi" -UseBasicParsing
        Start-Process msiexec.exe -Wait -ArgumentList "/i $env:TEMP\PowerShell.msi /quiet /norestart ADD_EXPLORER_CONTEXT_MENU_OPENPOWERSHELL=1 ADD_FILE_CONTEXT_MENU_RUNPOWERSHELL=1 ENABLE_PSREMOTING=0 REGISTER_MANIFEST=1 USE_MU=0 ENABLE_MU=0"
        $pwshPath = "$env:ProgramFiles\PowerShell\7"
        if (Test-Path $pwshPath) { Write-Host "##vso[task.prependpath]$pwshPath" }
      }
      if (-not (Get-Command az -ErrorAction SilentlyContinue)) {
        Write-Host "Installing Azure CLI..."
        Invoke-WebRequest -Uri "https://aka.ms/installazurecliwindowsarm64" -OutFile "$env:TEMP\AzureCLI.msi" -UseBasicParsing
        Start-Process msiexec.exe -Wait -ArgumentList "/i $env:TEMP\AzureCLI.msi /quiet /norestart"
        $azPath = "$env:ProgramFiles\Microsoft SDKs\Azure\CLI2\wbin"
        if (Test-Path $azPath) { Write-Host "##vso[task.prependpath]$azPath" }
      }

- task: AzureCLI@2
  displayName: 'Checkout ${{ parameters.repoName }}'
  inputs:
    azureSubscription: 'FoundryLocalCore-SP'
    scriptType: pscore
    scriptLocation: inlineScript
    inlineScript: |
      $ErrorActionPreference = 'Stop'

      $repoDir = "${{ parameters.basePath }}/${{ parameters.repoName }}"
      $ref = "${{ parameters.ref }}"

      # Obtain bearer token scoped to Azure DevOps
      $token = az account get-access-token --resource 499b84ac-1321-427f-aa17-267ca6975798 --query accessToken -o tsv
      if ($LASTEXITCODE -ne 0 -or -not $token) { throw "Failed to obtain access token" }

      # Embed the token directly in the remote URL for reliable auth
      $repoUrl = "https://oauth:${token}@dev.azure.com/microsoft/windows.ai.toolkit/_git/${{ parameters.repoName }}"

      # Always clean to avoid conflicts with stale state from agent reuse
      if (Test-Path $repoDir) {
        Write-Host "Cleaning existing directory: $repoDir"
        Remove-Item -Recurse -Force $repoDir
      }

      # Create and init
      New-Item -ItemType Directory -Path $repoDir -Force | Out-Null
      Push-Location $repoDir
      git init
      git remote add origin $repoUrl

      # Fetch — use shallow clone for test-data-shared (no NBGV), full clone for others
      $branch = $ref -replace '^refs/heads/', ''
      $repoName = '${{ parameters.repoName }}'
      if ($repoName -eq 'test-data-shared') {
        git fetch origin $branch --depth=1
      } else {
        git fetch origin $branch
      }
      if ($LASTEXITCODE -ne 0) { throw "git fetch failed for ${{ parameters.repoName }}" }

      # Checkout
      git checkout "origin/$branch" -B $branch
      if ($LASTEXITCODE -ne 0) { throw "git checkout failed for ${{ parameters.repoName }} at ref $ref" }

      # LFS — enable for test-data-shared (contains LFS-tracked test data)
      if ($repoName -eq 'test-data-shared') {
        Write-Host "Pulling LFS objects..."
        git lfs install --local
        git lfs pull
        if ($LASTEXITCODE -ne 0) { throw "git lfs pull failed for ${{ parameters.repoName }}" }
      }

      Pop-Location
      Write-Host "Checked out ${{ parameters.repoName }} at $(git -C $repoDir rev-parse HEAD)"
